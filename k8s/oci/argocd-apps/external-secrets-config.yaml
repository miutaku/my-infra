apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oci-external-secrets-config
  namespace: argocd
  annotations:
    # ESO operator と bitwarden-sdk-server が Ready になってから適用する
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/miutaku/my-infra.git
    targetRevision: main
    path: k8s/oci/infrastructure/external-secrets-config
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
