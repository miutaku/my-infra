apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oci-reventer-stg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: git@github.com:miutaku/reventer.git
    targetRevision: main
    path: k8s/stg
  destination:
    server: https://kubernetes.default.svc
    namespace: app-reventer-stg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: backend
      jqPathExpressions:
        - .spec.template.spec.containers[].image
    - group: apps
      kind: Deployment
      name: frontend
      jqPathExpressions:
        - .spec.template.spec.containers[].image
    - group: apps
      kind: Deployment
      name: admin
      jqPathExpressions:
        - .spec.template.spec.containers[].image
