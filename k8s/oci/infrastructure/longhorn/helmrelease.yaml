apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 10m
  chart:
    spec:
      chart: longhorn
      version: 1.7.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    defaultSettings:
      defaultReplicaCount: 1
    persistence:
      defaultClassReplicaCount: 1
    longhornManager:
      nodeSelector:
        kubernetes.io/arch: arm64
    longhornDriver:
      nodeSelector:
        kubernetes.io/arch: arm64
    longhornUI:
      nodeSelector:
        kubernetes.io/arch: arm64
