apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-tunnel-token
  namespace: argocd
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: argocd-tunnel-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        # BSM シークレット名: CLOUDFLARE_ARGOCD_STG_TUNNEL_TOKEN
        # 値: reventer リポジトリの infrastructure/terraform/app で
        #     TF_WORKSPACE=stg-reventer terraform output -raw argocd_tunnel_token
        key: CLOUDFLARE_ARGOCD_STG_TUNNEL_TOKEN
