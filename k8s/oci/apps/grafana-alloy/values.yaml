controller:
  type: daemonset
  nodeSelector:
    kubernetes.io/arch: arm64

alloy:
  extraEnv:
    - name: GRAFANA_CLOUD_METRICS_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud-credentials
          key: GRAFANA_CLOUD_METRICS_URL
    - name: GRAFANA_CLOUD_METRICS_USERNAME
      valueFrom:
        secretKeyRef:
          name: grafana-cloud-credentials
          key: GRAFANA_CLOUD_METRICS_USERNAME
    - name: GRAFANA_CLOUD_METRICS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: grafana-cloud-credentials
          key: GRAFANA_CLOUD_METRICS_PASSWORD

  configMap:
    content: |
      // Node metrics via unix exporter
      prometheus.exporter.unix "node" {
        procfs_path = "/host/proc"
        sysfs_path  = "/host/sys"
        rootfs_path = "/host/root"
        uname_syscall_path = "/host/root/proc/sys/kernel/osrelease"
      }

      prometheus.scrape "node" {
        targets    = prometheus.exporter.unix.node.targets
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
        scrape_interval = "60s"
      }

      // Pod autodiscovery
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          action        = "keep"
          regex         = "true"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          target_label  = "__metrics_path__"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_ip", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          separator     = ":"
          target_label  = "__address__"
        }
      }

      prometheus.scrape "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
        scrape_interval = "60s"
      }

      // Remote write to Grafana Cloud
      prometheus.remote_write "grafana_cloud" {
        endpoint {
          url = env("GRAFANA_CLOUD_METRICS_URL")
          basic_auth {
            username = env("GRAFANA_CLOUD_METRICS_USERNAME")
            password = env("GRAFANA_CLOUD_METRICS_PASSWORD")
          }
        }
      }

  mounts:
    extra:
      - name: host-root
        mountPath: /host/root
        mountPropagation: HostToContainer
        readOnly: true
      - name: host-proc
        mountPath: /host/proc
        readOnly: true
      - name: host-sys
        mountPath: /host/sys
        readOnly: true

  securityContext:
    privileged: true

podAnnotations:
  prometheus.io/scrape: "false"

extraVolumes:
  - name: host-root
    hostPath:
      path: /
  - name: host-proc
    hostPath:
      path: /proc
  - name: host-sys
    hostPath:
      path: /sys
