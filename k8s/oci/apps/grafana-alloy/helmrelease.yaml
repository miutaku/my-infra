apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-alloy
  namespace: monitoring
spec:
  interval: 10m
  timeout: 10m
  upgrade:
    remediation:
      retries: 3
  install:
    remediation:
      retries: 3
  chart:
    spec:
      chart: alloy
      version: 0.12.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: grafana-alloy-values
      valuesKey: values.yaml
