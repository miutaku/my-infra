apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud-credentials
  namespace: monitoring
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: grafana-cloud-credentials
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_CLOUD_METRICS_URL
      remoteRef:
        key: GRAFANA_CLOUD_METRICS_URL
    - secretKey: GRAFANA_CLOUD_METRICS_USERNAME
      remoteRef:
        key: GRAFANA_CLOUD_METRICS_USERNAME
    - secretKey: GRAFANA_CLOUD_METRICS_PASSWORD
      remoteRef:
        key: GRAFANA_CLOUD_METRICS_PASSWORD
