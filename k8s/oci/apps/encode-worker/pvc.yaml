# NFS PV for recorded files — NAS accessed via L2TPv3 IPSec site-to-site VPN (IX2215 <-> OCI)
# __NAS_LOCAL_IP__ = TrueNAS の LAN IP (192.168.x.x) — L2TPv3 IPSec トンネル経由で OCI から到達可能
apiVersion: v1
kind: PersistentVolume
metadata:
  name: encode-worker-recorded-pv
spec:
  capacity:
    storage: 8Ti
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.20.192
    path: /mnt/raid1_case/recorded
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=3
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: encode-worker-recorded-pvc
  namespace: app-encode-worker
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 8Ti
  volumeName: encode-worker-recorded-pv
  storageClassName: ""
