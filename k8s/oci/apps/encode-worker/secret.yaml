apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: encode-worker-secrets
  namespace: app-encode-worker
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: encode-worker-secrets
    creationPolicy: Owner
  data:
    - secretKey: ENCODE_WORKER_TOKEN
      remoteRef:
        # BSM シークレット名: ENCODE_WORKER_TOKEN
        # 値: EPGStation 側と同じ値 (openssl rand -hex 32 で生成)
        key: ENCODE_WORKER_TOKEN
