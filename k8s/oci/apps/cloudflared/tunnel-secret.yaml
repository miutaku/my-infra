apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflared
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: cloudflared-tunnel-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        # BSM シークレット名: CLOUDFLARE_OKE_TUNNEL_TOKEN
        # 値: terraform output -raw oke_tunnel_token で取得
        key: CLOUDFLARE_OKE_TUNNEL_TOKEN
