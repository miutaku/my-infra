apiVersion: apps/v1
kind: Deployment
metadata:
  name: actions-runner-reventer
  namespace: actions-runner
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: actions-runner-reventer
  template:
    metadata:
      labels:
        app: actions-runner-reventer
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      # runner が自分自身を deregister できるよう graceful termination を長めに取る
      terminationGracePeriodSeconds: 90
      initContainers:
        - name: install-docker-cli
          image: docker:27.5.1-cli
          command:
            - sh
            - -c
          args:
            - |
              cp /usr/local/bin/docker /docker-cli/docker
              mkdir -p /docker-cli-plugins
              cp -a /usr/local/lib/docker/cli-plugins/. /docker-cli-plugins/ 2>/dev/null || true
              chmod +x /docker-cli/docker /docker-cli-plugins/* 2>/dev/null || true
          volumeMounts:
            - name: docker-cli
              mountPath: /docker-cli
            - name: docker-cli-plugins
              mountPath: /docker-cli-plugins
      containers:
        - name: runner
          image: myoung34/github-runner:ubuntu-jammy
          env:
            - name: REPO_URL
              value: "https://github.com/miutaku/reventer"
            - name: RUNNER_NAME_PREFIX
              value: "oci-oke"
            - name: LABELS
              value: "oci,oke,linux,arm64,reventer"
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            - name: DOCKER_TLS_CERTDIR
              value: ""
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: actions-runner-credentials
                  key: github-pat
          volumeMounts:
            - name: docker-cli
              mountPath: /usr/local/bin/docker
              subPath: docker
              readOnly: true
            - name: docker-cli-plugins
              mountPath: /usr/local/lib/docker/cli-plugins
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
        - name: docker
          image: docker:27.5.1-dind
          args:
            - --host=tcp://0.0.0.0:2375
            - --host=unix:///var/run/docker.sock
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          ports:
            - name: docker
              containerPort: 2375
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-graph-storage
              mountPath: /var/lib/docker
          readinessProbe:
            tcpSocket:
              port: docker
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: docker-cli
          emptyDir: {}
        - name: docker-cli-plugins
          emptyDir: {}
        - name: docker-graph-storage
          emptyDir: {}
