apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: actions-runner-credentials
  namespace: actions-runner
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: actions-runner-credentials
    creationPolicy: Owner
  data:
    - secretKey: github-pat
      remoteRef:
        # BSM シークレット名: GITHUB_REVENTER_RUNNER_PAT
        # 値: GitHub → Settings → Developer settings → Personal access tokens
        #     スコープ: repo (または manage_self_hosted_runners)
        #     対象リポジトリ: miutaku/reventer
        key: GITHUB_REVENTER_RUNNER_PAT
