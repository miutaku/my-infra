apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tfc-agent-credentials
  namespace: tfc-agent
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: tfc-agent-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        # BSM シークレット名: TFC_OKE_AGENT_TOKEN
        key: TFC_OKE_AGENT_TOKEN
    - secretKey: name
      remoteRef:
        # BSM シークレット名: TFC_OKE_AGENT_NAME
        key: TFC_OKE_AGENT_NAME
