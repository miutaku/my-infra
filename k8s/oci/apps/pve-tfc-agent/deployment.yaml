---
# PVEがある自宅はOCIと拠点間接続しているため、tfc-agentはOCIで動かす。
# PVEでtfc-agentを動かすと、terraform applyのたびにRKE2のワーカーノードが再起動してapplyが失敗するため。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tfc-agent
  namespace: tfc-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tfc-agent
  template:
    metadata:
      labels:
        app: tfc-agent
    spec:
      # OKEノードはARM (A1.Flex)
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: tfc-agent
          image: hashicorp/tfc-agent:1.28.8
          imagePullPolicy: Always
          env:
            - name: TFC_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tfc-agent-credentials
                  key: token
            - name: TFC_AGENT_NAME
              valueFrom:
                secretKeyRef:
                  name: tfc-agent-credentials
                  key: name
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
