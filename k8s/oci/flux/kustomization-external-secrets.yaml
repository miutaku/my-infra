apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: oci-external-secrets
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: oci-sources
  sourceRef:
    kind: GitRepository
    name: my-infra
  path: ./k8s/oci/infrastructure/external-secrets
  prune: true
  timeout: 5m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: external-secrets
      namespace: external-secrets
    - apiVersion: apps/v1
      kind: Deployment
      name: bitwarden-sdk-server
      namespace: external-secrets
