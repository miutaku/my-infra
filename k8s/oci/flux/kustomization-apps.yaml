apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: oci-apps
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: oci-cert-manager
    - name: oci-ingress-nginx
    - name: oci-longhorn
  sourceRef:
    kind: GitRepository
    name: my-infra
  path: ./k8s/oci/apps
  prune: true
  timeout: 5m
