apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: oci-cert-manager
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: oci-external-secrets
  sourceRef:
    kind: GitRepository
    name: my-infra
  path: ./k8s/oci/infrastructure/cert-manager
  prune: true
  timeout: 5m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: cert-manager
      namespace: cert-manager
