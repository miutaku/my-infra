apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oci-prd-external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/miutaku/my-infra.git
    targetRevision: main
    path: k8s/oci-prd/infrastructure/external-secrets-config
  destination:
    name: oke-prd
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
