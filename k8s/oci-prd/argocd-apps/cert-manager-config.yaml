apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oci-prd-cert-manager-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/miutaku/my-infra.git
    targetRevision: main
    path: k8s/oci-prd/infrastructure/cert-manager-config
  destination:
    name: oke-prd
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
