---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntopng-exporter-config
  namespace: monitoring
data:
  ntopng-exporter.yaml: |
    ntopng:
      endpoint: "http://ntopng-web.monitoring.svc.cluster.local:3000"
      allowUnsafeTLS: false
      user: admin
      password: admin
      authMethod: cookie
      scrapeInterval: 15s
      scrapeTargets:
        - hosts
        - interfaces
        - l7protocols

    host:
      # ntopng が -i nf://@2055 で起動すると "nf" という仮想 IF が作成される。
      # 実際の名前は ntopng Web UI の Interfaces 画面で確認して必要に応じて修正する。
      interfacesToMonitor:
        - nf

    metric:
      localSubnetsOnly:
        - "192.168.0.0/16"
        - "224.0.0.0/4"
      excludeDNSMetrics: false
      serve:
        ip: 0.0.0.0
        port: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntopng-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntopng-exporter
  template:
    metadata:
      labels:
        app: ntopng-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ntopng-exporter
          image: aauren/ntopng-exporter:v1.5.0
          ports:
            - name: metrics
              containerPort: 3001
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: ntopng-exporter-config
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: ntopng-exporter
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: ntopng-exporter
  ports:
    - name: metrics
      port: 3001
      targetPort: 3001
      protocol: TCP
