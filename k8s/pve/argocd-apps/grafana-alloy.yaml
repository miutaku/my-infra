apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: "0.12.0"
      helm:
        releaseName: grafana-alloy
        valueFiles:
          - $values/k8s/pve/grafana-alloy/values.yaml
    - repoURL: https://github.com/miutaku/my-infra.git
      targetRevision: main
      ref: values
    # ExternalSecret (grafana-cloud-credentials) を適用
    - repoURL: https://github.com/miutaku/my-infra.git
      targetRevision: main
      path: k8s/pve/grafana-alloy
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
