apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: unifi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://github.com/chrissnell/unifi-os-kubernetes.git
      targetRevision: main
      path: chart
      helm:
        releaseName: unifi
        valueFiles:
          - $values/k8s/pve/unifi/values.yaml
    - repoURL: https://github.com/miutaku/my-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: unifi
  # ArgoCD v3 does not include postRenderers in the CRD schema for multi-source apps.
  # initContainers/volumes are patched manually via kubectl to fix UV_THREADPOOL_SIZE=256
  # crash on kernel 7.0. ignoreDifferences prevents ArgoCD from treating the patch as drift.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: unifi-unifi-os-server
      namespace: unifi
      jsonPointers:
        - /spec/template/spec/initContainers
        - /spec/template/spec/volumes
        - /spec/template/spec/containers/0/volumeMounts
        - /spec/template/spec/hostNetwork
        - /spec/template/spec/dnsPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
