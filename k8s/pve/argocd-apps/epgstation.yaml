apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: epgstation
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/miutaku/my-infra.git
    targetRevision: main
    path: k8s/pve/epgstation
  destination:
    server: https://kubernetes.default.svc
    namespace: app-epgstation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
