apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: konomitv
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/miutaku/my-infra.git
    targetRevision: main
    path: k8s/pve/konomitv
  destination:
    server: https://kubernetes.default.svc
    namespace: app-konomitv
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
