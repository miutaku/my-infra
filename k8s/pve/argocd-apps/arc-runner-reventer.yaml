apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-reventer
  namespace: argocd
  annotations:
    # controller と github-app-secret が準備されてから deploy
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.9.3
    helm:
      releaseName: arc-runner-reventer
      values: |
        githubConfigUrl: "https://github.com/miutaku/reventer"
        githubConfigSecret: "github-app-secret"
        minRunners: 0
        maxRunners: 4
        containerMode:
          type: "dind"
        template:
          spec:
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                resources:
                  requests:
                    cpu: "500m"
                    memory: "1Gi"
                  limits:
                    cpu: "4"
                    memory: "8Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
