apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-reventer
  namespace: argocd
  annotations:
    # controller と github-app-secret が準備されてから deploy
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.9.3
    helm:
      releaseName: arc-runner-reventer
      values: |
        githubConfigUrl: "https://github.com/miutaku/reventer"
        githubConfigSecret: "github-token-secret"
        # Explicit controller SA — ArgoCD renders templates without cluster
        # lookup, so the chart's auto-discovery of the controller fails.
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-systems-gha-rs-controller
        minRunners: 0
        maxRunners: 6
        containerMode:
          type: "dind"
        template:
          spec:
            nodeSelector:
              kubernetes.io/arch: amd64
              kubernetes.io/os: linux
              kubernetes.io/role: agent
            affinity:
              nodeAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    preference:
                      matchExpressions:
                        - key: topology.miutaku/proxmox-node
                          operator: In
                          values:
                            - pve-x570
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                resources:
                  requests:
                    cpu: "1000m"
                    memory: "1Gi"
                  limits:
                    cpu: "6"
                    memory: "8Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
