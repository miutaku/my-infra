apiVersion: v1
kind: ConfigMap
metadata:
  name: epgstation-config
  namespace: app-epgstation
data:
  config.yml: |
    port: 8888
    mirakurunPath: http://mirakurun.app-mirakurun.svc.cluster.local:40772

    dbtype: mysql
    mysql:
      database: epgstation
      host: mariadb.app-epgstation.svc.cluster.local
      port: 3306
      user: epgstation
      password: ${MYSQL_PASSWORD}
      enable_ssl: false

    needToReplaceEnclosingCharacters: true
    epgUpdateIntervalTime: 10

    conflictPriority: 1
    recPriority: 2

    isEnabledDropCheck: true

    recordedFormat: '%TITLE%-%YEAR%年%MONTH%月%DAY%日%HOUR%時%MIN%分%SEC%秒'
    recordedFileExtension: .m2ts
    recorded:
      - name: recorded
        path: '%ROOT%/recorded'
        limitThreshold: 10000
        action: 'remove'

    thumbnail: '%ROOT%/thumbnail'
    thumbnailSize: 480x270
    thumbnailPosition: 10

    recordingStartCommand: "/bin/sh %ROOT%/config/notify.sh $NOTIFY_WEBHOOK 録画開始"
    recordingFinishCommand: "/bin/sh %ROOT%/config/notify.sh $NOTIFY_WEBHOOK 録画完了"
    recordingPrepRecFailedCommand: "/bin/sh %ROOT%/config/notify.sh $CRITICAL_WEBHOOK 録画準備失敗 @here"
    recordingFailedCommand: "/bin/sh %ROOT%/config/notify.sh $CRITICAL_WEBHOOK 録画失敗 @here"
    encodingFinishCommand: "/bin/sh %ROOT%/config/notify.sh $NOTIFY_WEBHOOK エンコード完了"

    ffmpeg: /usr/local/bin/ffmpeg
    ffprobe: /usr/local/bin/ffprobe
    encodeProcessNum: 2
    concurrentEncodeNum: 1
    encode:
      - name: H.264 (OCI Remote)
        cmd: '%NODE% %ROOT%/config/enc/enc-remote.js libx264'
        suffix: -avc.mkv
        rete: 4.0
      - name: H.265 (OCI Remote)
        cmd: '%NODE% %ROOT%/config/enc/enc-remote.js libx265'
        suffix: -hevc.mkv
        rete: 4.0

    urlscheme:
      m2ts:
        ios: vlc-x-callback://x-callback-url/stream?url=http://ADDRESS
        android: intent://ADDRESS#Intent;package=org.videolan.vlc;type=video;scheme=http;end
      video:
        ios: infuse://x-callback-url/play?url=http://ADDRESS
        android: intent://ADDRESS#Intent;package=com.mxtech.videoplayer.pro;type=video;scheme=http;end
      download:
        ios: vlc-x-callback://x-callback-url/stream?url=http://ADDRESS

    stream:
      live:
        ts:
          m2ts:
            - name: 無変換
            - name: 720p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -y -f mpegts pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -vf yadif,scale=-2:480 -b:v 1500k -preset veryfast
                -y -f mpegts pipe:1
          m2tsll:
            - name: 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -f mpegts -analyzeduration 500000 -i pipe:0
                -map 0 -c:s copy -c:d copy -ignore_unknown -fflags nobuffer -flags low_delay
                -max_delay 250000 -max_interleave_delta 1 -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -flags +cgop -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -y -f mpegts pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -f mpegts -analyzeduration 500000 -i pipe:0
                -map 0 -c:s copy -c:d copy -ignore_unknown -fflags nobuffer -flags low_delay
                -max_delay 250000 -max_interleave_delta 1 -threads 0
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -flags +cgop -vf yadif,scale=-2:480 -b:v 1500k -preset veryfast
                -y -f mpegts pipe:1
          webm:
            - name: 720p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 3
                -c:a libvorbis -ar 48000 -b:a 192k -ac 2
                -c:v libvpx-vp9 -vf yadif,scale=-2:720 -b:v 3000k
                -deadline realtime -speed 4 -cpu-used -8 -y -f webm pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 2
                -c:a libvorbis -ar 48000 -b:a 128k -ac 2
                -c:v libvpx-vp9 -vf yadif,scale=-2:480 -b:v 1500k
                -deadline realtime -speed 4 -cpu-used -8 -y -f webm pipe:1
          mp4:
            - name: 720p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -profile:v baseline -preset veryfast
                -tune fastdecode,zerolatency
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -vf yadif,scale=-2:480 -b:v 1500k -profile:v baseline -preset veryfast
                -tune fastdecode,zerolatency
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
          hls:
            - name: 720p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -map 0 -threads 0 -ignore_unknown
                -max_muxing_queue_size 1024 -f hls -hls_time 3 -hls_list_size 17 -hls_allow_cache 1
                -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -flags +loop-global_header %OUTPUT%
            - name: 480p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -map 0 -threads 0 -ignore_unknown
                -max_muxing_queue_size 1024 -f hls -hls_time 3 -hls_list_size 17 -hls_allow_cache 1
                -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -vf yadif,scale=-2:480 -b:v 1500k -preset veryfast
                -flags +loop-global_header %OUTPUT%
      recorded:
        ts:
          webm:
            - name: 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -sn -threads 3
                -c:a libvorbis -ar 48000 -b:a 192k -ac 2
                -c:v libvpx-vp9 -vf yadif,scale=-2:720 -b:v 3000k
                -deadline realtime -speed 4 -cpu-used -8 -y -f webm pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -sn -threads 3
                -c:a libvorbis -ar 48000 -b:a 128k -ac 2
                -c:v libvpx-vp9 -vf yadif,scale=-2:480 -b:v 1500k
                -deadline realtime -speed 4 -cpu-used -8 -y -f webm pipe:1
          mp4:
            - name: 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -profile:v baseline -preset veryfast
                -tune fastdecode,zerolatency
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -vf yadif,scale=-2:480 -b:v 1500k -profile:v baseline -preset veryfast
                -tune fastdecode,zerolatency
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
          hls:
            - name: 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -sn -map 0 -threads 0 -ignore_unknown
                -max_muxing_queue_size 1024 -f hls -hls_time 3 -hls_list_size 0 -hls_allow_cache 1
                -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -flags +loop-global_header %OUTPUT%
            - name: 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -sn -map 0 -threads 0 -ignore_unknown
                -max_muxing_queue_size 1024 -f hls -hls_time 3 -hls_list_size 0 -hls_allow_cache 1
                -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -vf yadif,scale=-2:480 -b:v 1500k -preset veryfast
                -flags +loop-global_header %OUTPUT%
        encoded:
          webm:
            - name: 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -ss %SS% -i %INPUT% -sn -threads 3
                -c:a libvorbis -ar 48000 -b:a 192k -ac 2
                -c:v libvpx-vp9 -vf scale=-2:720 -b:v 3000k
                -deadline realtime -speed 4 -cpu-used -8 -y -f webm pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -ss %SS% -i %INPUT% -sn -threads 3
                -c:a libvorbis -ar 48000 -b:a 128k -ac 2
                -c:v libvpx-vp9 -vf scale=-2:480 -b:v 1500k
                -deadline realtime -speed 4 -cpu-used -8 -y -f webm pipe:1
          mp4:
            - name: 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -ss %SS% -i %INPUT% -sn -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf scale=-2:720 -b:v 3000k -profile:v baseline -preset veryfast
                -tune fastdecode,zerolatency
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -ss %SS% -i %INPUT% -sn -threads 0
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -vf scale=-2:480 -b:v 1500k -profile:v baseline -preset veryfast
                -tune fastdecode,zerolatency
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
          hls:
            - name: 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -ss %SS% -i %INPUT% -sn -threads 0 -ignore_unknown
                -max_muxing_queue_size 1024 -f hls -hls_time 3 -hls_list_size 0 -hls_allow_cache 1
                -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf scale=-2:720 -b:v 3000k -preset veryfast
                -flags +loop-global_header %OUTPUT%
            - name: 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -ss %SS% -i %INPUT% -sn -threads 0 -ignore_unknown
                -max_muxing_queue_size 1024 -f hls -hls_time 3 -hls_list_size 0 -hls_allow_cache 1
                -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -vf scale=-2:480 -b:v 3000k -preset veryfast
                -flags +loop-global_header %OUTPUT%

  notify.sh: |
    #!/bin/sh
    # 引数: WEBHOOK LABEL [MENTION]
    # MENTION に "@here" を渡すとチャンネル全員にメンション
    WEBHOOK="$1"
    LABEL="$2"
    MENTION="${3:-}"
    if [ -z "$WEBHOOK" ]; then exit 0; fi
    if [ -n "$NAME" ] && [ -n "$CHANNELNAME" ]; then
      CONTENT="${LABEL}: [${CHANNELNAME}] ${NAME}"
    elif [ -n "$NAME" ]; then
      CONTENT="${LABEL}: ${NAME}"
    else
      CONTENT="${LABEL}"
    fi
    # ドロップ・スクランブルが発生していれば本文に付記
    if [ -n "$DROP_CNT" ] && [ "$DROP_CNT" != "0" ]; then
      CONTENT="${CONTENT} (ドロップ: ${DROP_CNT})"
    fi
    if [ -n "$SCRAMBLING_CNT" ] && [ "$SCRAMBLING_CNT" != "0" ]; then
      CONTENT="${CONTENT} (スクランブル: ${SCRAMBLING_CNT})"
    fi
    if [ -n "$MENTION" ]; then
      CONTENT="${MENTION} ${CONTENT}"
    fi
    PAYLOAD=$(node -e "process.stdout.write(JSON.stringify({content:process.env.C}))" C="$CONTENT")
    curl -s -X POST "$WEBHOOK" \
      -H 'Content-Type: application/json' \
      -d "$PAYLOAD"

  epgUpdaterLogConfig.yml: |
    appenders:
      stdout:
        type: stdout
    categories:
      default:
        appenders:
          - stdout
        level: info

  operatorLogConfig.yml: |
    appenders:
      stdout:
        type: stdout
    categories:
      default:
        appenders:
          - stdout
        level: info

  serviceLogConfig.yml: |
    appenders:
      stdout:
        type: stdout
    categories:
      default:
        appenders:
          - stdout
        level: info

  enc-remote.js: |
    'use strict';
    const http  = require('http');
    const https = require('https');
    const execFile = require('child_process').execFile;

    const ffprobe = process.env.FFPROBE;
    const input   = process.env.INPUT;
    const output  = process.env.OUTPUT;
    const isDualMono = parseInt(process.env.AUDIOCOMPONENTTYPE, 10) === 2;
    const codec   = process.argv[2] || 'libx264';

    const workerUrl      = process.env.ENCODE_WORKER_URL;
    const workerToken    = process.env.ENCODE_WORKER_TOKEN;
    const criticalHook   = process.env.CRITICAL_WEBHOOK;
    const pollMs         = 10000; // 10 秒ごとにポーリング
    const retryMs        = 60000; // 接続エラー時の再試行間隔
    const maxRetries     = 30;    // 最大再試行回数 (30 × 60s = 30 分)

    // ファイルパスから番組名を取り出す (日時サフィックス以降を除去)
    const programName = (output || input || '')
      .split('/').pop()
      .replace(/[-_]\d{4}年\d{2}月\d{2}日.*$/, '')
      .replace(/\.[^.]+$/, '') || '不明';

    // Discord CRITICAL_WEBHOOK に通知 (失敗しても握り潰す)
    const notifyDiscord = (content) =>
      new Promise((resolve) => {
        if (!criticalHook) return resolve();
        const url  = new URL(criticalHook);
        const data = JSON.stringify({ content });
        const mod  = url.protocol === 'https:' ? https : http;
        const req  = mod.request({
          hostname: url.hostname,
          port:     url.port || (url.protocol === 'https:' ? 443 : 80),
          path:     url.pathname + url.search,
          method:   'POST',
          headers:  { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) },
        }, resolve);
        req.on('error', resolve);
        req.write(data);
        req.end();
      });

    const getDuration = (filePath) =>
      new Promise((resolve, reject) => {
        execFile(ffprobe, ['-v', '0', '-show_format', '-of', 'json', filePath], (err, stdout) => {
          if (err) return reject(err);
          try { resolve(parseFloat(JSON.parse(stdout).format.duration)); }
          catch (e) { reject(e); }
        });
      });

    const request = (method, path, body) =>
      new Promise((resolve, reject) => {
        const url    = new URL(path, workerUrl);
        const mod    = url.protocol === 'https:' ? https : http;
        const data   = body ? JSON.stringify(body) : null;
        const opts   = {
          hostname: url.hostname,
          port:     url.port || (url.protocol === 'https:' ? 443 : 80),
          path:     url.pathname + url.search,
          method,
          headers:  {
            'Authorization': `Bearer ${workerToken}`,
            'Content-Type':  'application/json',
          },
        };
        const req = mod.request(opts, (res) => {
          let buf = '';
          res.on('data', (d) => buf += d);
          res.on('end', () => {
            try { resolve({ status: res.statusCode, body: JSON.parse(buf) }); }
            catch (e) { resolve({ status: res.statusCode, body: buf }); }
          });
        });
        req.on('error', reject);
        if (data) req.write(data);
        req.end();
      });

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    (async () => {
      if (!workerUrl || !workerToken) {
        console.error('ENCODE_WORKER_URL / ENCODE_WORKER_TOKEN が未設定');
        process.exit(1);
      }

      const duration = await getDuration(input).catch(() => 0);

      // ジョブ投入 (再試行あり)
      let jobId;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const res = await request('POST', '/v1/jobs', {
            input, output, codec, is_dual_mono: isDualMono,
          });
          if (res.status === 201 && res.body.job_id) {
            jobId = res.body.job_id;
            break;
          }
        } catch (_) {}
        console.error(`encode-worker 接続失敗 (試行 ${i + 1}/${maxRetries}), ${retryMs / 1000}s 後に再試行`);
        await sleep(retryMs);
      }

      if (!jobId) {
        await notifyDiscord(`@here エンコード失敗 (ジョブ投入不可): ${programName}`);
        console.error('encode-worker へのジョブ投入に失敗しました');
        process.exit(1);
      }

      // ポーリングループ
      let retries = 0;
      while (true) {
        await sleep(pollMs);
        try {
          const res = await request('GET', `/v1/jobs/${jobId}`);
          if (res.status === 404) {
            await notifyDiscord(`@here エンコード失敗 (ジョブ消失 - Pod 再起動の可能性): ${programName}`);
            console.error('ジョブが消失しました (OCI 再起動による可能性)。EPGStation 側で再キューできます。');
            process.exit(1);
          }
          if (res.status !== 200) continue;
          const { status, progress, log } = res.body;

          if (duration > 0 && typeof progress === 'number') {
            process.stdout.write(
              JSON.stringify({ type: 'progress', percent: progress, log: log || '' }) + '\n'
            );
          }

          if (status === 'completed') { process.exit(0); }
          if (status === 'failed') {
            await notifyDiscord(`@here エンコード失敗: ${programName}\n${log || ''}`);
            console.error('エンコード失敗:', log);
            process.exit(1);
          }
          retries = 0;
        } catch (_) {
          retries++;
          if (retries >= maxRetries) {
            await notifyDiscord(`@here エンコード失敗 (通信途絶 ${maxRetries * pollMs / 60000}分): ${programName}`);
            console.error('encode-worker との通信が長時間途絶しました');
            process.exit(1);
          }
        }
      }
    })();
