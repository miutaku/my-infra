        level: info

  serviceLogConfig.yml: |
    appenders:
      stdout:
        type: stdout
    categories:
      default:
        appenders:
          - stdout
        level: info

  enc-local.js: |
    'use strict';
    const { spawn } = require('child_process');

    const ffmpeg = process.env.FFMPEG || process.env.FFMPEG_PATH || '/usr/local/bin/ffmpeg';
    const ffprobe = process.env.FFPROBE || process.env.FFPROBE_PATH || '/usr/local/bin/ffprobe';
    const input = process.env.INPUT;
    const output = process.env.OUTPUT;
    const codec = process.argv[2] === 'libx265' ? 'libx265' : 'libx264';
    const videoHeight = parseInt(process.env.VIDEORESOLUTION, 10) || 1080;
    const isDualMono = parseInt(process.env.AUDIOCOMPONENTTYPE, 10) === 2;
    const audioBitrate = videoHeight > 720 ? '192k' : '128k';
    const preset = codec === 'libx265' ? 'medium' : 'veryfast';
    const crf = codec === 'libx265' ? 28 : 23;

    const run = (cmd, args) => new Promise((resolve, reject) => {
      const child = spawn(cmd, args, { stdio: ['ignore', 'pipe', 'pipe'] });
      let stdout = '';
      let stderr = '';
      child.stdout.on('data', (chunk) => { stdout += String(chunk); });
      child.stderr.on('data', (chunk) => { stderr += String(chunk); });
      child.on('error', reject);
      child.on('close', (code) => {
        if (code === 0) resolve({ stdout, stderr });
        else reject(new Error(stderr || `command failed: ${cmd} ${args.join(' ')}`));
      });
    });

    const getDuration = async () => {
      if (!input) return 0;
      try {
        const { stdout } = await run(ffprobe, ['-v', 'error', '-show_entries', 'format=duration', '-of', 'default=nw=1:nk=1', input]);
        const duration = parseFloat(stdout.trim());
        return Number.isFinite(duration) ? duration : 0;
      } catch (_) {
        return 0;
      }
    };

    const emitProgress = (percent, log = '') => {
      process.stdout.write(JSON.stringify({ type: 'progress', percent, log }) + '\n');
    };

    (async () => {
      if (!input || !output) {
        console.error('INPUT / OUTPUT が未設定です');
        process.exit(1);
      }

      const duration = await getDuration();
      const args = ['-y', '-nostdin', '-analyzeduration', '10M', '-probesize', '32M'];
      if (isDualMono) {
        args.push('-dual_mono_mode', 'main');
      }
      args.push('-i', input);
      args.push('-map', '0', '-ignore_unknown', '-max_muxing_queue_size', '1024', '-sn');
      args.push('-vf', `yadif,scale=-2:${videoHeight}`);
      args.push('-c:v', codec, '-preset', preset, '-crf', String(crf));
      args.push('-c:a', 'aac', '-ar', '48000', '-b:a', audioBitrate, '-ac', '2');
      args.push('-movflags', 'faststart', '-f', 'matroska', output);

      const child = spawn(ffmpeg, args, { stdio: ['ignore', 'pipe', 'pipe'] });
      let lastPercent = 0;
      let progressBuffer = '';
      child.stderr.on('data', (chunk) => {
        const text = String(chunk);
        process.stderr.write(text);
        progressBuffer += text;
        const lines = progressBuffer.split(/\r?\n/);
        progressBuffer = lines.pop() || '';
        for (const line of lines) {
          const match = line.match(/out_time_ms=(\d+)/);
          if (!match) continue;
          const outTimeMs = parseInt(match[1], 10);
          let percent = 0;
          if (duration > 0 && outTimeMs > 0) {
            percent = Math.min(1, outTimeMs / (duration * 1000000));
          }
          if (percent > lastPercent) {
            lastPercent = percent;
            emitProgress(percent, line.trim());
          }
        }
      });

      child.on('error', (err) => {
        console.error(err);
        process.exit(1);
      });

      child.on('close', (code) => {
        if (code === 0) {
          emitProgress(1.0, 'completed');
          process.exit(0);
        }
        console.error(`ffmpeg exited with code ${code}`);
        process.exit(code || 1);
      });

      process.on('SIGINT', () => child.kill('SIGINT'));
      process.on('SIGTERM', () => child.kill('SIGTERM'));
    })();

  enc-remote.js: |
    'use strict';
    const http  = require('http');
    const https = require('https');
    const fs    = require('fs');

    const input   = process.env.INPUT;
    const output  = process.env.OUTPUT;
    const isDualMono = parseInt(process.env.AUDIOCOMPONENTTYPE, 10) === 2;
    const codec   = process.argv[2] || 'libx264';

    const workerUrl      = process.env.ENCODE_WORKER_URL;
    const workerToken    = process.env.ENCODE_WORKER_TOKEN;
    const criticalHook   = process.env.CRITICAL_WEBHOOK;
    const pollMs         = 10000; // 10 秒ごとにポーリング
    const retryMs        = 60000; // 接続エラー時の再試行間隔
    const maxRetries     = 30;    // 最大再試行回数 (30 × 60s = 30 分)

    // ファイルパスから番組名を取り出す (日時サフィックス以降を除去)
    const programName = (output || input || '')
      .split('/').pop()
      .replace(/[-_]\d{4}年\d{2}月\d{2}日.*$/, '')
      .replace(/\.[^.]+$/, '') || '不明';

    // Discord CRITICAL_WEBHOOK に通知 (失敗しても握り潰す)
    const notifyDiscord = (content) =>
      new Promise((resolve) => {
        if (!criticalHook) return resolve();
        const url  = new URL(criticalHook);
        const data = JSON.stringify({ content });
        const mod  = url.protocol === 'https:' ? https : http;
        const req  = mod.request({
          hostname: url.hostname,
          port:     url.port || (url.protocol === 'https:' ? 443 : 80),
          path:     url.pathname + url.search,
          method:   'POST',
          headers:  { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) },
        }, resolve);
        req.on('error', resolve);
        req.write(data);
        req.end();
      });

    const request = (method, path, body) =>
      new Promise((resolve, reject) => {
        const url    = new URL(path, workerUrl);
        const mod    = url.protocol === 'https:' ? https : http;
        const data   = body ? JSON.stringify(body) : null;
        const opts   = {
          hostname: url.hostname,
          port:     url.port || (url.protocol === 'https:' ? 443 : 80),
          path:     url.pathname + url.search,
          method,
          headers:  {
            'Authorization': `Bearer ${workerToken}`,
            'Content-Type':  'application/json',
          },
        };
        const req = mod.request(opts, (res) => {
          let buf = '';
          res.on('data', (d) => buf += d);
          res.on('end', () => {
            try { resolve({ status: res.statusCode, body: JSON.parse(buf) }); }
            catch (e) { resolve({ status: res.statusCode, body: buf }); }
          });
        });
        req.on('error', reject);
        if (data) req.write(data);
        req.end();
      });

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    (async () => {
      if (!workerUrl || !workerToken) {
        console.error('ENCODE_WORKER_URL / ENCODE_WORKER_TOKEN が未設定');
        process.exit(1);
      }

      // ジョブ投入 (再試行あり)
      let jobId;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const res = await request('POST', '/v1/jobs', {
            input, output, codec, is_dual_mono: isDualMono,
          });
          if (res.status === 201 && res.body.job_id) {
            jobId = res.body.job_id;
            break;
          }
        } catch (_) {}
        console.error(`encode-worker 接続失敗 (試行 ${i + 1}/${maxRetries}), ${retryMs / 1000}s 後に再試行`);
        await sleep(retryMs);
      }

      if (!jobId) {
        await notifyDiscord(`@here エンコード失敗 (ジョブ投入不可): ${programName}`);
        console.error('encode-worker へのジョブ投入に失敗しました');
        process.exit(1);
      }

      // ポーリングループ
      let retries = 0;
      while (true) {
        await sleep(pollMs);
        try {
          const res = await request('GET', `/v1/jobs/${jobId}`);
          if (res.status === 404) {
            // Recreate 更新後に新 Pod が起動した場合、旧 Pod の preStop drain が
            // エンコードを完了させてから終了しているため出力ファイルが存在するはず。
            if (fs.existsSync(output)) {
              process.stdout.write(JSON.stringify({ type: 'progress', percent: 1.0, log: 'completed' }) + '\n');
              console.error('ジョブ消失を検知しましたが出力ファイルが存在するためエンコード完了とみなします。');
              process.exit(0);
            }
            retries++;
            if (retries >= maxRetries) {
              await notifyDiscord(`@here エンコード失敗 (ジョブ消失 - Pod 再起動の可能性): ${programName}`);
              console.error('ジョブが消失しました。出力ファイルも存在しないためエンコード失敗とみなします。');
              process.exit(1);
            }
            console.error(`ジョブ消失を検知 (試行 ${retries}/${maxRetries}), ${retryMs / 1000}s 後に再確認`);
            await sleep(retryMs);
            continue;
          }
          if (res.status !== 200) continue;
          const { status, progress, log } = res.body;

          if (typeof progress === 'number') {
            process.stdout.write(
              JSON.stringify({ type: 'progress', percent: progress, log: log || '' }) + '\n'
            );
          }

          if (status === 'completed') { process.exit(0); }
          if (status === 'failed') {
            await notifyDiscord(`@here エンコード失敗: ${programName}\n${log || ''}`);
            console.error('エンコード失敗:', log);
            process.exit(1);
          }
          retries = 0;
        } catch (_) {
          retries++;
          if (retries >= maxRetries) {
            await notifyDiscord(`@here エンコード失敗 (通信途絶 ${maxRetries * pollMs / 60000}分): ${programName}`);
            console.error('encode-worker との通信が長時間途絶しました');
            process.exit(1);
          }
        }
      }
    })();
