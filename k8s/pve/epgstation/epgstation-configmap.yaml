apiVersion: v1
kind: ConfigMap
metadata:
  name: epgstation-config
  namespace: app-epgstation
data:
  config.yml: |
    port: 8888
    # Cloudflare Tunnel 経由では X-Forwarded-Proto: https が付き isSecureProtocol()=true と
    # 判定されるが、https セクションを設定していないため getConfig() が httpsConfigError を投げて
    # /api/config が 500 になる。clientSocketioPort を明示すれば isSecure 分岐を通らず解決する。
    clientSocketioPort: 443
    mirakurunPath: http://mirakurun.app-mirakurun.svc.cluster.local:40772

    dbtype: mysql
    mysql:
      database: epgstation
      host: mariadb.infra-db.svc.cluster.local
      port: 3306
      user: epgstation
      password: ${MYSQL_PASSWORD}
      enable_ssl: false

    needToReplaceEnclosingCharacters: true
    epgUpdateIntervalTime: 10

    conflictPriority: 1
    recPriority: 2

    isEnabledDropCheck: true

    recordedFormat: '%TITLE%-%YEAR%年%MONTH%月%DAY%日%HOUR%時%MIN%分%SEC%秒'
    recordedFileExtension: .m2ts
    recorded:
      - name: recorded
        path: '%ROOT%/recorded'
        limitThreshold: 10000
        action: 'remove'

    thumbnail: '%ROOT%/thumbnail'
    thumbnailSize: 480x270
    thumbnailPosition: 10

    recordingStartCommand: "/bin/sh %ROOT%/config/notify.sh $NOTIFY_WEBHOOK 録画開始"
    recordingFinishCommand: "/bin/sh %ROOT%/config/rec-finish.sh"
    recordingPrepRecFailedCommand: "/bin/sh %ROOT%/config/notify.sh $CRITICAL_WEBHOOK 録画準備失敗 @here"
    recordingFailedCommand: "/bin/sh %ROOT%/config/notify.sh $CRITICAL_WEBHOOK 録画失敗 @here"
    encodingFinishCommand: "/bin/sh %ROOT%/config/notify.sh $NOTIFY_WEBHOOK エンコード完了"

    ffmpeg: /usr/local/bin/ffmpeg
    ffprobe: /usr/local/bin/ffprobe
    encodeProcessNum: 2
    concurrentEncodeNum: 1
    encode:
      # rate はタイムアウト倍率 (動画実時間 * rate 経過で EPGStation が
      # エンコードプロセスを kill)。OKE (A1.Flex ~1.6 core) のエンコードは
      # 遅く変動も大きい (libx265 実測 0.02〜0.07x = 実時間の 14〜50 倍)。
      # ワーカー側キュー待ち (MAX_CONCURRENT_JOBS=1) も経過時間に含まれる。
      # 注意: duration(ms) * rate が Node の setTimeout 上限 (2^31-1 ms ≒ 24.8 日)
      # を超えるとタイマーが即発火して開始直後に kill される。rate 100 なら
      # 約 6 時間の録画まで安全。
      - name: H.264 (OCI Remote)
        cmd: '%NODE% %ROOT%/config/enc/enc-remote.js libx264'
        suffix: -avc.mkv
        rate: 100.0
      - name: H.265 (OCI Remote)
        cmd: '%NODE% %ROOT%/config/enc/enc-remote.js libx265'
        suffix: -hevc.mkv
        rate: 100.0
      - name: H.264 (Local)
        cmd: '%NODE% %ROOT%/config/enc/enc-local.js libx264'
        suffix: -avc.mkv
        rate: 100.0
      - name: H.265 (Local)
        cmd: '%NODE% %ROOT%/config/enc/enc-local.js libx265'
        suffix: -hevc.mkv
        rate: 100.0

    urlscheme:
      m2ts:
        ios: vlc-x-callback://x-callback-url/stream?url=http://ADDRESS
        android: intent://ADDRESS#Intent;package=org.videolan.vlc;type=video;scheme=http;end
      video:
        ios: infuse://x-callback-url/play?url=http://ADDRESS
        android: intent://ADDRESS#Intent;package=com.mxtech.videoplayer.pro;type=video;scheme=http;end
      download:
        ios: vlc-x-callback://x-callback-url/stream?url=http://ADDRESS

    stream:
      live:
        ts:
          m2ts:
            - name: 無変換
            - name: 1080p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:1080 -b:v 5000k -preset veryfast
                -y -f mpegts pipe:1
            - name: 720p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -y -f mpegts pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -vf yadif,scale=-2:480 -b:v 1500k -preset veryfast
                -y -f mpegts pipe:1
          m2tsll:
            - name: 1080p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -f mpegts -analyzeduration 500000 -i pipe:0
                -map 0 -c:s copy -c:d copy -ignore_unknown -fflags nobuffer -flags low_delay
                -max_delay 250000 -max_interleave_delta 1 -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -flags +cgop -vf yadif,scale=-2:1080 -b:v 5000k -preset veryfast
                -y -f mpegts pipe:1
            - name: 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -f mpegts -analyzeduration 500000 -i pipe:0
                -map 0 -c:s copy -c:d copy -ignore_unknown -fflags nobuffer -flags low_delay
                -max_delay 250000 -max_interleave_delta 1 -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -flags +cgop -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -y -f mpegts pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -f mpegts -analyzeduration 500000 -i pipe:0
                -map 0 -c:s copy -c:d copy -ignore_unknown -fflags nobuffer -flags low_delay
                -max_delay 250000 -max_interleave_delta 1 -threads 0
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -flags +cgop -vf yadif,scale=-2:480 -b:v 1500k -preset veryfast
                -y -f mpegts pipe:1
          webm:
            - name: 1080p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 3
                -c:a libvorbis -ar 48000 -b:a 192k -ac 2
                -c:v libvpx-vp9 -vf yadif,scale=-2:1080 -b:v 5000k
                -deadline realtime -speed 4 -cpu-used -8 -y -f webm pipe:1
            - name: 720p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 3
                -c:a libvorbis -ar 48000 -b:a 192k -ac 2
                -c:v libvpx-vp9 -vf yadif,scale=-2:720 -b:v 3000k
                -deadline realtime -speed 4 -cpu-used -8 -y -f webm pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 2
                -c:a libvorbis -ar 48000 -b:a 128k -ac 2
                -c:v libvpx-vp9 -vf yadif,scale=-2:480 -b:v 1500k
                -deadline realtime -speed 4 -cpu-used -8 -y -f webm pipe:1
          mp4:
            - name: 1080p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:1080 -b:v 5000k -profile:v baseline -preset veryfast
                -tune fastdecode,zerolatency
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
            - name: 720p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -profile:v baseline -preset veryfast
                -tune fastdecode,zerolatency
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
            - name: 480p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -threads 0
                -c:a aac -ar 48000 -b:a 128k -ac 2
                -c:v libx264 -vf yadif,scale=-2:480 -b:v 1500k -profile:v baseline -preset veryfast
                -tune fastdecode,zerolatency
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
          hls:
            - name: 1080p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -map 0 -threads 0 -ignore_unknown
                -max_muxing_queue_size 1024 -f hls -hls_time 3 -hls_list_size 17 -hls_allow_cache 1
                -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments
                -c:a aac -ar 48000 -b:a 192k -ac 2
                -c:v libx264 -vf yadif,scale=-2:1080 -b:v 5000k -preset veryfast
                -flags +loop-global_header %OUTPUT%
            - name: 720p
              cmd: >-
                %FFMPEG% -re -dual_mono_mode main -i pipe:0 -sn -map 0 -threads 0 -ignore_unknown
                -max_muxing_queue_size 1024 -f hls -hls_time 3 -hls_list_size 17 -hls_allow_cache 1
