# NFS PVC for recorded files
apiVersion: v1
kind: PersistentVolume
metadata:
  name: epgstation-recorded-pv
spec:
  capacity:
    storage: 8Ti
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.20.192
    path: /mnt/raid1_case/recorded
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=3
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: epgstation-recorded-pvc
  namespace: app-epgstation
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 8Ti
  volumeName: epgstation-recorded-pv
  storageClassName: ""
---
