apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: epgstation-secrets
  namespace: app-epgstation
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: epgstation-secrets
    creationPolicy: Owner
  data:
    - secretKey: MYSQL_PASSWORD
      remoteRef:
        # BSM シークレット名: EPGSTATION_MYSQL_PASSWORD
        key: EPGSTATION_MYSQL_PASSWORD
    - secretKey: NOTIFY_WEBHOOK
      remoteRef:
        # BSM シークレット名: EPGSTATION_NOTIFY_WEBHOOK
        # 値: Discord/Slack webhook URL
        key: EPGSTATION_NOTIFY_WEBHOOK
    - secretKey: CRITICAL_WEBHOOK
      remoteRef:
        # BSM シークレット名: EPGSTATION_CRITICAL_WEBHOOK
        key: EPGSTATION_CRITICAL_WEBHOOK
    - secretKey: ENCODE_WORKER_TOKEN
      remoteRef:
        # BSM シークレット名: ENCODE_WORKER_TOKEN
        # 値: encode-worker への認証 Bearer token (openssl rand -hex 32 で生成)
        key: ENCODE_WORKER_TOKEN
