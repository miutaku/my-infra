apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: infra-db
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.8
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --performance-schema=false
            - --expire_logs_days=1
          env:
            # 既存 datadir をメジャーアップグレードした際に mariadb-upgrade を自動実行する。
            # 実行前に system table のバックアップ (system_mysql_backup_*.sql.zst) が datadir に残る。
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
            # MARIADB_DATABASE / MARIADB_USER は初回 init 時のみ有効 (nextcloud DB は手動作成, docs/nextcloud-setup.md)
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-credentials
                  key: MYSQL_ROOT_PASSWORD
            - name: MARIADB_DATABASE
              value: epgstation
            - name: MARIADB_USER
              value: epgstation
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-credentials
                  key: EPGSTATION_MYSQL_PASSWORD
            - name: TZ
              value: Asia/Tokyo
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      terminationGracePeriodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
