apiVersion: batch/v1
kind: CronJob
metadata:
  name: mariadb-backup
  namespace: infra-db
spec:
  schedule: "0 18 * * *"  # 03:00 JST
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure

          containers:
            - name: backup
              image: alpine:3.22
              command: ["sh", "/scripts/backup.sh"]
              env:
                # バックアップ対象 "app:database" のスペース区切りリスト
                - name: APPS
                  value: "epgstation:epgstation nextcloud:nextcloud"
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: MYSQL_ROOT_PASSWORD
                - name: OCI_NAMESPACE
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: OCI_NAMESPACE
                - name: OCI_S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: OCI_S3_ACCESS_KEY
                - name: OCI_S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: OCI_S3_SECRET_KEY
                - name: NOTIFY_WEBHOOK
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: NOTIFY_WEBHOOK
                - name: CRITICAL_WEBHOOK
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: CRITICAL_WEBHOOK
              volumeMounts:
                - name: scripts
                  mountPath: /scripts

          volumes:
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
