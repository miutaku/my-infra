apiVersion: batch/v1
kind: CronJob
metadata:
  name: mariadb-backup
  namespace: infra-db
spec:
  schedule: "0 18 * * *"  # 03:00 JST
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure

          initContainers:
            - name: dump
              image: mariadb:10.11
              command:
                - sh
                - -c
                - |
                  DATE=$(date +%Y%m%d-%H%M%S)
                  echo "${DATE}" > /backup/timestamp
                  mysqldump \
                    -h mariadb.infra-db.svc.cluster.local \
                    -u root -p"${MYSQL_ROOT_PASSWORD}" \
                    --single-transaction \
                    --routines \
                    --triggers \
                    --databases epgstation \
                    | gzip > /backup/dump.sql.gz
                  echo "dump completed: $(du -sh /backup/dump.sql.gz)"
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: MYSQL_ROOT_PASSWORD
              volumeMounts:
                - name: backup
                  mountPath: /backup

          containers:
            - name: upload
              image: rclone/rclone:latest
              command:
                - sh
                - -c
                - |
                  set -eu
                  DATE=$(cat /backup/timestamp)
                  FILENAME="epgstation-${DATE}.sql.gz"

                  mkdir -p /root/.config/rclone
                  cat > /root/.config/rclone/rclone.conf << EOF
                  [oci]
                  type = s3
                  provider = Other
                  access_key_id = ${OCI_S3_ACCESS_KEY}
                  secret_access_key = ${OCI_S3_SECRET_KEY}
                  endpoint = https://${OCI_NAMESPACE}.compat.objectstorage.ap-tokyo-1.oraclecloud.com
                  EOF

                  rclone copyto /backup/dump.sql.gz "oci:db-backup/${FILENAME}"
                  echo "upload completed: ${FILENAME}"
              env:
                - name: OCI_NAMESPACE
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: OCI_NAMESPACE
                - name: OCI_S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: OCI_S3_ACCESS_KEY
                - name: OCI_S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: OCI_S3_SECRET_KEY
              volumeMounts:
                - name: backup
                  mountPath: /backup

          volumes:
            - name: backup
              emptyDir: {}
