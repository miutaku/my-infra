apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-backup-credentials
  namespace: infra-db
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: db-backup-credentials
    creationPolicy: Owner
  data:
    - secretKey: MYSQL_ROOT_PASSWORD
      remoteRef:
        # BSM シークレット名: SHARED_MARIADB_ROOT_PASSWORD
        key: SHARED_MARIADB_ROOT_PASSWORD
    - secretKey: OCI_NAMESPACE
      remoteRef:
        # BSM シークレット名: DB_BACKUP_OCI_NAMESPACE
        # 値: terraform output object_storage_namespace
        key: DB_BACKUP_OCI_NAMESPACE
    - secretKey: OCI_S3_ACCESS_KEY
      remoteRef:
        # BSM シークレット名: DB_BACKUP_OCI_S3_ACCESS_KEY
        # 値: terraform output db_backup_s3_access_key_id
        key: DB_BACKUP_OCI_S3_ACCESS_KEY
    - secretKey: OCI_S3_SECRET_KEY
      remoteRef:
        # BSM シークレット名: DB_BACKUP_OCI_S3_SECRET_KEY
        # 値: terraform output db_backup_s3_secret_key (sensitive)
        key: DB_BACKUP_OCI_S3_SECRET_KEY
    - secretKey: NOTIFY_WEBHOOK
      remoteRef:
        # BSM シークレット名: EPGSTATION_NOTIFY_WEBHOOK (EPGStation と共用)
        key: EPGSTATION_NOTIFY_WEBHOOK
    - secretKey: CRITICAL_WEBHOOK
      remoteRef:
        # BSM シークレット名: EPGSTATION_CRITICAL_WEBHOOK (EPGStation と共用)
        key: EPGSTATION_CRITICAL_WEBHOOK
