apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-scripts
  namespace: infra-db
data:
  backup.sh: |
    #!/bin/sh
    set -eu

    apk add --no-cache mariadb-client rclone curl > /dev/null

    FILENAME=""
    STATUS=failure

    notify() {
      [ -z "${NOTIFY_WEBHOOK}" ] && return 0
      if [ "${STATUS}" = "success" ]; then
        CONTENT="DBバックアップ完了: ${FILENAME}"
        WEBHOOK="${NOTIFY_WEBHOOK}"
      else
        CONTENT="@here DBバックアップ失敗: ${FILENAME:-error before dump}"
        WEBHOOK="${CRITICAL_WEBHOOK}"
      fi
      curl -s -X POST "${WEBHOOK}" \
        -H 'Content-Type: application/json' \
        -d "{\"content\":\"${CONTENT}\"}"
    }
    trap notify EXIT

    DATE=$(date +%Y%m%d-%H%M%S)
    FILENAME="epgstation-${DATE}.sql.gz"

    mysqldump \
      -h mariadb.infra-db.svc.cluster.local \
      -u root -p"${MYSQL_ROOT_PASSWORD}" \
      --single-transaction \
      --routines \
      --triggers \
      --databases epgstation \
      | gzip > /tmp/dump.sql.gz
    echo "dump completed: $(du -sh /tmp/dump.sql.gz)"

    mkdir -p /root/.config/rclone
    cat > /root/.config/rclone/rclone.conf << EOF
    [oci]
    type = s3
    provider = Other
    access_key_id = ${OCI_S3_ACCESS_KEY}
    secret_access_key = ${OCI_S3_SECRET_KEY}
    endpoint = https://${OCI_NAMESPACE}.compat.objectstorage.ap-tokyo-1.oraclecloud.com
    EOF

    rclone copyto /tmp/dump.sql.gz "oci:db-backup/${FILENAME}"
    echo "upload completed: ${FILENAME}"

    STATUS=success
