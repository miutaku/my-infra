apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-scripts
  namespace: infra-db
data:
  backup.sh: |
    #!/bin/sh
    set -eu

    apk add --no-cache mariadb-client rclone curl > /dev/null

    # バックアップ対象: "app:database" をスペース区切りで列挙
    # 共用クラスタにアプリが増えたら、この行を1要素足すだけ
    APPS="${APPS:-epgstation:epgstation}"

    STATUS=failure
    CURRENT=""
    RESULTS=""

    notify() {
      [ -z "${NOTIFY_WEBHOOK}" ] && return 0
      if [ "${STATUS}" = "success" ]; then
        CONTENT="DBバックアップ完了: ${RESULTS}"
        WEBHOOK="${NOTIFY_WEBHOOK}"
      else
        CONTENT="@here DBバックアップ失敗 (${CURRENT:-error before dump}): ${RESULTS:-none}"
        WEBHOOK="${CRITICAL_WEBHOOK}"
      fi
      curl -s -X POST "${WEBHOOK}" \
        -H 'Content-Type: application/json' \
        -d "{\"content\":\"${CONTENT}\"}"
    }
    trap notify EXIT

    mkdir -p /root/.config/rclone
    cat > /root/.config/rclone/rclone.conf << EOF
    [oci]
    type = s3
    provider = Other
    access_key_id = ${OCI_S3_ACCESS_KEY}
    secret_access_key = ${OCI_S3_SECRET_KEY}
    endpoint = https://${OCI_NAMESPACE}.compat.objectstorage.ap-tokyo-1.oraclecloud.com
    EOF

    DATE=$(date +%Y%m%d-%H%M%S)

    for ENTRY in ${APPS}; do
      APP="${ENTRY%%:*}"
      DB="${ENTRY#*:}"
      CURRENT="${APP}"
      FILENAME="${APP}-${DATE}.sql.gz"

      # MariaDB 12 で mysql* 互換シンボリックリンクが削除されるため mariadb-dump を使う
      mariadb-dump \
        -h mariadb.infra-db.svc.cluster.local \
        -u root -p"${MYSQL_ROOT_PASSWORD}" \
        --single-transaction \
        --routines \
        --triggers \
        --databases "${DB}" \
        | gzip > /tmp/dump.sql.gz
      echo "[${APP}] dump completed: $(du -sh /tmp/dump.sql.gz)"

      rclone copyto /tmp/dump.sql.gz "oci:db-backup/${APP}/${FILENAME}"
      echo "[${APP}] upload completed: ${APP}/${FILENAME}"

      RESULTS="${RESULTS}${APP}/${FILENAME} "
    done

    STATUS=success
