apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntopng
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntopng
  template:
    metadata:
      labels:
        app: ntopng
    spec:
      containers:
        - name: ntopng
          image: ntop/ntopng:latest
          args:
            - --community
            - -i
            - nf://@2055
            - -d
            - /var/lib/ntopng
            - --http-port=3000
            # Cloudflare Access が認証レイヤーを担うため ntopng 側のログインを無効化
            - --disable-login=1
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: netflow
              containerPort: 2055
              protocol: UDP
          volumeMounts:
            - name: data
              mountPath: /var/lib/ntopng
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ntopng-data
      restartPolicy: Always
