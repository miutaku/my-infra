apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflared
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: cloudflared-tunnel-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        # BSM シークレット名: CLOUDFLARE_RKE2_TUNNEL_TOKEN
        # 値: terraform -chdir=terraform/cloudflare output -raw rke2_tunnel_secret_value
        key: CLOUDFLARE_RKE2_TUNNEL_TOKEN
