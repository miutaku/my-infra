config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        follow_redirects: true
        preferred_ip_protocol: "ip4"
    icmp:
      prober: icmp
      timeout: 5s
      icmp:
        preferred_ip_protocol: "ip4"

# Alloy から /probe エンドポイントをスクレイプするため ServiceMonitor は不要
serviceMonitor:
  enabled: false

service:
  port: 9115
  type: ClusterIP

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

# ターゲット一覧は Grafana Alloy の River config (grafana-alloy/values.yaml) で管理する
# VLAN 設定が固まった段階で追記する
