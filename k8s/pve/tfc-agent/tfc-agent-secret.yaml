apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tfc-agent-credentials
  namespace: tfc-agent
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: tfc-agent-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        # BSM シークレット名: TFC_HOME_AGENT_TOKEN
        # 値: Terraform Cloud → Settings → Agents → home-pool → Token
        key: TFC_HOME_AGENT_TOKEN
    - secretKey: name
      remoteRef:
        # BSM シークレット名: TFC_HOME_AGENT_NAME
        # 値: home-rke2-agent-01 など任意のエージェント表示名
        key: TFC_HOME_AGENT_NAME
