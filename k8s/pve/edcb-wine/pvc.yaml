apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edcb-wine-data
  namespace: app-edcb-wine
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: edcb-wine-recorded-pv
spec:
  capacity:
    storage: 8Ti
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.20.192
    path: /mnt/raid1_case/recorded
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=3
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edcb-wine-recorded
  namespace: app-edcb-wine
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 8Ti
  volumeName: edcb-wine-recorded-pv
  storageClassName: ""
