---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pve-exporter
  template:
    metadata:
      labels:
        app: pve-exporter
    spec:
      containers:
        - name: pve-exporter
          image: prompve/prometheus-pve-exporter:3.5.3
          args:
            - --config.file=/etc/pve/pve.yml
          ports:
            - containerPort: 9221
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /etc/pve
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          secret:
            secretName: pve-exporter-config
            items:
              - key: pve.yml
                path: pve.yml
---
apiVersion: v1
kind: Service
metadata:
  name: pve-exporter
  namespace: monitoring
spec:
  selector:
    app: pve-exporter
  ports:
    - port: 9221
      targetPort: metrics
      name: metrics
  type: ClusterIP
