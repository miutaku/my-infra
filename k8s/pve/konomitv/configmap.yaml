apiVersion: v1
kind: ConfigMap
metadata:
  name: konomitv-config
  namespace: app-konomitv
data:
  config.yaml: |
    general:
      backend: EDCB
      always_receive_tv_from_mirakurun: true
      edcb_url: tcp://edcb-wine.app-edcb-wine.svc.cluster.local:4510/
      mirakurun_url: http://mirakurun.app-mirakurun.svc.cluster.local:40772/
      encoder: FFmpeg
      program_update_interval: 5.0
      debug: false
      debug_encoder: false
    server:
      port: 7000
      custom_https_certificate: null
      custom_https_private_key: null
    tv:
      preferred_terrestrial_region: null
      max_alive_time: 10
      debug_mode_ts_path: null
    video:
      # RKE2/containerd does not provide /.dockerenv, so KonomiTV detects this
      # container as Linux and uses this path without a /host-rootfs prefix.
      recorded_folders:
        - /mnt/recorded
      exclude_scan_paths: []
    capture:
      upload_folders: []
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: konomitv-proxy-config
  namespace: app-konomitv
data:
  default.conf: |
    server {
        listen 7001;
        server_name _;

        location / {
            proxy_pass http://127.0.0.77:7010;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
