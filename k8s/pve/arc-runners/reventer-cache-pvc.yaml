# NFS PV/PVC on nas-01 — RWX so runner pods aren't pinned to a single node
apiVersion: v1
kind: PersistentVolume
metadata:
  name: arc-runner-reventer-cache-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.20.191
    path: /mnt/raid1_case/arc-runner-cache
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=3
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arc-runner-reventer-cache
  namespace: arc-runners
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  volumeName: arc-runner-reventer-cache-pv
  storageClassName: ""
