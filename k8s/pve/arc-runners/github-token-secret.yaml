apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-token-secret
  namespace: arc-runners
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: github-token-secret
    creationPolicy: Owner
  data:
    - secretKey: github_token
      remoteRef:
        # BSM secret name: GitHub PAT with repo scope for miutaku/reventer runners.
        key: GITHUB_REVENTER_RUNNER_PAT
