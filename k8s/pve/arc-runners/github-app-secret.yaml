apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-app-secret
  namespace: arc-runners
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: github-app-secret
    creationPolicy: Owner
  data:
    - secretKey: github_app_id
      remoteRef:
        # BSM シークレット名: GITHUB_APP_ARC_APP_ID
        # 値: GitHub App → Settings → General → App ID
        key: GITHUB_APP_ARC_APP_ID
    - secretKey: github_app_installation_id
      remoteRef:
        # BSM シークレット名: GITHUB_APP_ARC_INSTALLATION_ID
        # 値: GitHub App → Install App → Installation ID (URL末尾の数字)
        key: GITHUB_APP_ARC_INSTALLATION_ID
    - secretKey: github_app_private_key
      remoteRef:
        # BSM シークレット名: GITHUB_APP_ARC_PRIVATE_KEY
        # 値: GitHub App → General → Private keys → Generate → PEM全文
        key: GITHUB_APP_ARC_PRIVATE_KEY
