apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: annict-rec-sync-secrets
  namespace: app-annict-rec-sync
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: annict-rec-sync-secrets
    creationPolicy: Owner
  data:
    - secretKey: ANNICT_TOKEN
      remoteRef:
        # BSM シークレット名: ANNICT_API_TOKEN
        # 値: Annict 個人アクセストークン (read 権限) — https://annict.com/settings/apps
        key: ANNICT_API_TOKEN
