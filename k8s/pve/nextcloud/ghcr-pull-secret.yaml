apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: app-nextcloud
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"miutaku","password":"{{ .ghcr_pat }}","auth":"{{ printf "miutaku:%s" .ghcr_pat | b64enc }}"}}}'
  data:
    - secretKey: ghcr_pat
      remoteRef:
        # BSM シークレット名: EPGSTATION_GHCR_PAT (Packages: Read 権限の PAT を epgstation と共用)
        key: EPGSTATION_GHCR_PAT
