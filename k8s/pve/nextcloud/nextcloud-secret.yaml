apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nextcloud-secrets
  namespace: app-nextcloud
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: nextcloud-secrets
    creationPolicy: Owner
  data:
    - secretKey: MYSQL_PASSWORD
      remoteRef:
        # BSM シークレット名: NEXTCLOUD_MYSQL_PASSWORD
        # 値: infra-db MariaDB の nextcloud ユーザーのパスワード (docs/nextcloud-setup.md)
        key: NEXTCLOUD_MYSQL_PASSWORD
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        # BSM シークレット名: NEXTCLOUD_ADMIN_PASSWORD
        # 値: NextCloud 初期 admin ユーザーのパスワード (初回インストール時のみ使用)
        key: NEXTCLOUD_ADMIN_PASSWORD
