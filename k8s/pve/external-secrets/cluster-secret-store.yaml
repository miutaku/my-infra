apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: bitwarden
spec:
  provider:
    bitwarden:
      auth:
        secretRef:
          credentials:
            # Step 3 で kubectl create secret した Bootstrap Secret を参照する
            name: bitwarden-access-token
            namespace: external-secrets
            key: token
      # bitwarden-sdk-server Service (external-secrets namespace)
      bitwardenServerSDKURL: "http://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998"
      # CHANGE_ME: BSM の Organization ID (Settings → Organization → ID)
      organizationID: "CHANGE_ME"
      # CHANGE_ME: BSM の Project ID (my-infra プロジェクトの ID)
      projectID: "CHANGE_ME"
