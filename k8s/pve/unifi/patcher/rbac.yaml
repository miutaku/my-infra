apiVersion: v1
kind: ServiceAccount
metadata:
  name: unifi-runtime-patcher
  namespace: unifi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unifi-runtime-patcher
  namespace: unifi
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["unifi-unifi-os-server"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unifi-runtime-patcher
  namespace: unifi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: unifi-runtime-patcher
subjects:
  - kind: ServiceAccount
    name: unifi-runtime-patcher
    namespace: unifi
