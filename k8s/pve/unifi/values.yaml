systemIp: "192.168.0.202"

service:
  type: LoadBalancer
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.20.202"
    metallb.universe.tf/allow-shared-ip: "unifi"

persistence:
  data:
    storageClass: local-path
    size: 20Gi
  mongo:
    storageClass: local-path
    size: 10Gi

nodeSelector:
  unifi: "true"

resources:
  requests:
    cpu: 500m
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 8Gi
