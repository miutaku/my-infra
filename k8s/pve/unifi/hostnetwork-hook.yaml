---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unifi-patcher
  namespace: unifi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unifi-deployment-patcher
  namespace: unifi
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unifi-patcher
  namespace: unifi
subjects:
  - kind: ServiceAccount
    name: unifi-patcher
    namespace: unifi
roleRef:
  kind: Role
  name: unifi-deployment-patcher
  apiGroup: rbac.authorization.k8s.io
---
# hostNetwork: true を Deployment に適用する Post-Sync Hook
# L2 SW のブロードキャスト discovery (UDP 10001) を Pod が受信できるようにする
apiVersion: batch/v1
kind: Job
metadata:
  name: unifi-hostnetwork-patch
  namespace: unifi
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: unifi-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          image: bitnami/kubectl:latest
          command:
            - kubectl
            - patch
            - deployment
            - unifi
            - -n
            - unifi
            - --type
            - merge
            - -p
            - '{"spec":{"template":{"spec":{"hostNetwork":true,"dnsPolicy":"ClusterFirstWithHostNet"}}}}'
