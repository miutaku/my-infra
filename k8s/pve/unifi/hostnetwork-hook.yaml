---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unifi-patcher
  namespace: unifi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unifi-deployment-patcher
  namespace: unifi
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unifi-patcher
  namespace: unifi
subjects:
  - kind: ServiceAccount
    name: unifi-patcher
    namespace: unifi
roleRef:
  kind: Role
  name: unifi-deployment-patcher
  apiGroup: rbac.authorization.k8s.io
---
# Post-Sync Hook:
# hostNetwork: true + initContainer (system.properties書き込み) を Deployment にパッチする
# linuxserver は MONGO_* env からレプリカセット対応URIを生成できないため、
# initContainer が毎回起動前に mongodb+srv:// URIを system.properties に直接書き込む
# (--type merge で initContainers 配列をまるごと置換し古いコンテナが残らないようにする)
apiVersion: batch/v1
kind: Job
metadata:
  name: unifi-hostnetwork-patch
  namespace: unifi
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: unifi-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          image: bitnami/kubectl:latest
          command:
            - kubectl
            - patch
            - deployment
            - unifi
            - -n
            - unifi
            - --type
            - merge
            - -p
            - |
              {
                "spec": {
                  "template": {
                    "spec": {
                      "hostNetwork": true,
                      "dnsPolicy": "ClusterFirstWithHostNet",
                      "initContainers": [{
                        "name": "write-system-properties",
                        "image": "busybox:latest",
                        "command": ["sh", "-c", "mkdir -p /config/data && grep -q 'mongodb+srv://.*ace' /config/data/system.properties 2>/dev/null || printf 'db.mongo.uri=mongodb+srv://%s:%s@unifi.ps73pvx.mongodb.net/ace?authSource=admin\\ndb.mongo.dbname=ace\\n' \"$MONGO_USER\" \"$MONGO_PASS\" > /config/data/system.properties"],
                        "env": [{
                          "name": "MONGO_USER",
                          "valueFrom": {
                            "secretKeyRef": {
                              "name": "unifi-mongodb-secret",
                              "key": "username"
                            }
                          }
                        }, {
                          "name": "MONGO_PASS",
                          "valueFrom": {
                            "secretKeyRef": {
                              "name": "unifi-mongodb-secret",
                              "key": "password"
                            }
                          }
                        }],
                        "volumeMounts": [{
                          "name": "unifi-data",
                          "mountPath": "/config"
                        }]
                      }]
                    }
                  }
                }
              }
