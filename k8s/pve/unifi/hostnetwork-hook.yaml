---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unifi-patcher
  namespace: unifi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unifi-deployment-patcher
  namespace: unifi
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unifi-patcher
  namespace: unifi
subjects:
  - kind: ServiceAccount
    name: unifi-patcher
    namespace: unifi
roleRef:
  kind: Role
  name: unifi-deployment-patcher
  apiGroup: rbac.authorization.k8s.io
---
# Post-Sync Hook:
# hostNetwork: true + initContainer (system.properties削除) を Deployment にパッチする
# initContainer が毎回起動前に system.properties を削除することで
# linuxserver が MONGO_* 変数から常に最新の認証情報で再生成する
apiVersion: batch/v1
kind: Job
metadata:
  name: unifi-hostnetwork-patch
  namespace: unifi
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: unifi-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          image: bitnami/kubectl:latest
          command:
            - kubectl
            - patch
            - deployment
            - unifi
            - -n
            - unifi
            - --type
            - strategic
            - -p
            - |
              {
                "spec": {
                  "template": {
                    "spec": {
                      "hostNetwork": true,
                      "dnsPolicy": "ClusterFirstWithHostNet",
                      "initContainers": [{
                        "name": "remove-system-properties",
                        "image": "busybox:latest",
                        "command": ["sh", "-c", "rm -f /config/data/system.properties"],
                        "volumeMounts": [{
                          "name": "unifi-data",
                          "mountPath": "/config"
                        }]
                      }]
                    }
                  }
                }
              }
