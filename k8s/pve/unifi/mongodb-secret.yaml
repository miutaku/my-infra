apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: unifi-mongodb-secret
  namespace: unifi
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: unifi-mongodb-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: UNIFI_MONGO_USER
    - secretKey: password
      remoteRef:
        key: UNIFI_MONGO_PASS
    - secretKey: host
      remoteRef:
        # Atlas の hostname のみ (mongodb+srv:// や / は含めない)
        # 例: cluster0.abcde.mongodb.net
        key: UNIFI_MONGO_HOST
