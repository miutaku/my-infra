apiVersion: apps/v1
kind: Deployment
metadata:
  name: pmacct
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pmacct
  template:
    metadata:
      labels:
        app: pmacct
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9273"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: telegraf
          image: telegraf:1.33
          args: ["--config", "/etc/telegraf/telegraf.conf"]
          ports:
            - name: netflow
              containerPort: 2055
              protocol: UDP
            - name: metrics
              containerPort: 9273
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/telegraf
              readOnly: true
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: pmacct-config
      restartPolicy: Always
