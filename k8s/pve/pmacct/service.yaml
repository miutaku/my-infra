---
# IX2215 が NetFlow v9 を送信する宛先 (MetalLB IP は ntopng から引き継ぎ)
apiVersion: v1
kind: Service
metadata:
  name: pmacct-netflow
  namespace: monitoring
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.20.210"
spec:
  type: LoadBalancer
  selector:
    app: pmacct
  ports:
    - name: netflow
      port: 2055
      targetPort: 2055
      protocol: UDP
---
# Grafana Alloy が Prometheus メトリクスをスクレイプする
apiVersion: v1
kind: Service
metadata:
  name: pmacct-metrics
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: pmacct
  ports:
    - name: metrics
      port: 9514
      targetPort: 9514
      protocol: TCP
