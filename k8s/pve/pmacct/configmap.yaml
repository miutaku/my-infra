apiVersion: v1
kind: ConfigMap
metadata:
  name: pmacct-config
  namespace: monitoring
data:
  telegraf.conf: |
    [agent]
      interval = "10s"
      flush_interval = "60s"
      omit_hostname = true

    [[inputs.netflow]]
      service_address = "udp://:2055"
      protocol = "ipfix"

    # src/dst/protocol/tcp_flags/interface を Prometheus ラベル (tag) に昇格させる
    # src_port/dst_port はカーディナリティ抑制のため除外
    [[processors.converter]]
      [processors.converter.fields]
        tag = ["src", "dst", "protocol", "tcp_flags", "in_snmp", "out_snmp"]

    [[outputs.prometheus_client]]
      listen = ":9273"
      path = "/metrics"
      metric_version = 2
      expiration_interval = "120s"
