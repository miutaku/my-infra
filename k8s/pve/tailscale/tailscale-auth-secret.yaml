apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tailscale-auth
  namespace: tailscale
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: tailscale-auth
    creationPolicy: Owner
  data:
    - secretKey: TS_AUTHKEY
      remoteRef:
        # BSM シークレット名: TAILSCALE_AUTH_KEY
        # 値: Tailscale Admin Console → Settings → Keys → Auth keys
        key: TAILSCALE_AUTH_KEY
