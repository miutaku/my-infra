controller:
  type: daemonset
  tolerations:
    - operator: Exists
  hostPID: true
  volumes:
    extra:
      - name: rootfs
        hostPath:
          path: /
      - name: procfs
        hostPath:
          path: /proc
      - name: sysfs
        hostPath:
          path: /sys

alloy:
  clustering:
    enabled: true

  securityContext:
    privileged: true
    allowPrivilegeEscalation: true

  extraEnv:
    - name: GRAFANA_CLOUD_METRICS_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud-credentials
          key: metrics-url
    - name: GRAFANA_CLOUD_METRICS_USERNAME
      valueFrom:
        secretKeyRef:
          name: grafana-cloud-credentials
          key: metrics-username
    - name: GRAFANA_CLOUD_METRICS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: grafana-cloud-credentials
          key: metrics-password

  mounts:
    extra:
      - name: rootfs
        mountPath: /host/root
        readOnly: true
      - name: procfs
        mountPath: /host/proc
        readOnly: true
      - name: sysfs
        mountPath: /host/sys
        readOnly: true

  configMap:
    create: true
    content: |
      // ── Node metrics (unix exporter) ─────────────────────────────────────
      prometheus.exporter.unix "node" {
        rootfs_path = "/host/root"
        procfs_path = "/host/proc"
        sysfs_path  = "/host/sys"
      }

      prometheus.scrape "node" {
        targets    = prometheus.exporter.unix.node.targets
        forward_to = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        job_name        = "integrations/node_exporter"
        scrape_interval = "60s"
      }

      // ── Kubernetes pod 自動検出 ───────────────────────────────────────────
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          action        = "keep"
          regex         = "true"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          action        = "replace"
          target_label  = "__metrics_path__"
          regex         = "(.+)"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_port"]
          action        = "replace"
          target_label  = "__address__"
          regex         = "(.+)"
          replacement   = "$1"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        scrape_interval = "60s"
      }

      // ── SNMP: IX2215 (snmp-exporter 経由) ────────────────────────────────
      prometheus.scrape "snmp_ix2215" {
        targets = [
          {
            "__address__"      = "snmp-exporter-prometheus-snmp-exporter.monitoring.svc.cluster.local:9116",
            "__param_target"   = "192.168.0.254",
            "__param_module"   = "ix2215",
            "__param_auth"     = "ix2215_v2",
            "instance"         = "ix2215",
            "job"              = "snmp",
          },
        ]
        metrics_path    = "/snmp"
        forward_to      = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        scrape_interval = "60s"
      }

      // ── PVE exporter: pve-x570 / pve-b550m ───────────────────────────────
      prometheus.scrape "pve_x570" {
        targets = [
          {
            "__address__"    = "pve-exporter.monitoring.svc.cluster.local:9221",
            "__param_target" = "192.168.0.115",
            "instance"       = "pve-x570",
            "job"            = "pve",
          },
        ]
        metrics_path    = "/pve"
        forward_to      = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        scrape_interval = "60s"
      }

      prometheus.scrape "pve_b550m" {
        targets = [
          {
            "__address__"    = "pve-exporter.monitoring.svc.cluster.local:9221",
            "__param_target" = "192.168.0.119",
            "instance"       = "pve-b550m",
            "job"            = "pve",
          },
        ]
        metrics_path    = "/pve"
        forward_to      = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        scrape_interval = "60s"
      }

      // ── node_exporter: 非 k8s VM (static) ───────────────────────────────
      // node_exporter が各 VM にインストール済みであること (ansible/monitoring)
      prometheus.scrape "node_static" {
        targets = [
          { "__address__" = "192.168.20.101:9100", "instance" = "dev-app-server",   "job" = "node" },
          { "__address__" = "192.168.20.150:9100", "instance" = "dev-rec-server",   "job" = "node" },
          { "__address__" = "192.168.20.151:9100", "instance" = "prd-rec-server",   "job" = "node" },
          { "__address__" = "192.168.20.135:9100", "instance" = "lb-01",            "job" = "node" },
          { "__address__" = "192.168.20.136:9100", "instance" = "lb-02",            "job" = "node" },
          { "__address__" = "192.168.0.132:9100",  "instance" = "unifi-os-server",  "job" = "node" },
          { "__address__" = "192.168.40.51:9100",  "instance" = "mm-server-01",     "job" = "node" },
        ]
        forward_to = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        job_name        = "integrations/node_exporter"
        scrape_interval = "60s"
      }

      // ── SNMP: TrueNAS Scale (nas-01 / nas-02) ───────────────────────────────
      prometheus.scrape "snmp_truenas" {
        targets = [
          {
            "__address__"      = "snmp-exporter-prometheus-snmp-exporter.monitoring.svc.cluster.local:9116",
            "__param_target"   = "192.168.20.191",
            "__param_module"   = "truenas",
            "__param_auth"     = "truenas_v2",
            "instance"         = "nas-01",
            "job"              = "snmp_truenas",
          },
          {
            "__address__"      = "snmp-exporter-prometheus-snmp-exporter.monitoring.svc.cluster.local:9116",
            "__param_target"   = "192.168.20.192",
            "__param_module"   = "truenas",
            "__param_auth"     = "truenas_v2",
            "instance"         = "nas-02",
            "job"              = "snmp_truenas",
          },
        ]
        metrics_path    = "/snmp"
        forward_to      = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        scrape_interval = "60s"
      }

      // ── speedtest-exporter: 回線速度計測 ─────────────────────────────────
      // speedtest 実行に約35秒かかるため scrape_interval=5m / scrape_timeout=60s
      prometheus.scrape "speedtest" {
        targets = [
          {
            "__address__" = "speedtest-exporter.monitoring.svc.cluster.local:8080",
            "instance"    = "speedtest",
            "job"         = "speedtest",
          },
        ]
        clustering {
          enabled = true
        }
        forward_to = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        scrape_interval = "5m"
        scrape_timeout  = "60s"
      }

      // ── blackbox-exporter: HTTP 外形監視 ─────────────────────────────────
      prometheus.scrape "blackbox_http" {
        targets = [
          {
            "__address__"    = "blackbox-exporter.monitoring.svc.cluster.local:9115",
            "__param_target" = "http://192.168.20.254",
            "__param_module" = "http_2xx",
            "instance"       = "ix2215",
            "job"            = "blackbox_http",
          },
          {
            "__address__"    = "blackbox-exporter.monitoring.svc.cluster.local:9115",
            "__param_target" = "https://192.168.0.132:11443",
            "__param_module" = "http_2xx_insecure",
            "instance"       = "unifi-os-server",
            "job"            = "blackbox_http",
          },
        ]
        metrics_path    = "/probe"
        forward_to      = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        scrape_interval = "60s"
      }

      // ── blackbox-exporter: ICMP 死活監視 ─────────────────────────────────
      prometheus.scrape "blackbox_icmp" {
        targets = [
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.0.254",   "__param_module" = "icmp", "instance" = "ix2215",             "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.0.115",  "__param_module" = "icmp", "instance" = "pve-x570",            "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.0.119",  "__param_module" = "icmp", "instance" = "pve-b550m",           "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.0.132",  "__param_module" = "icmp", "instance" = "unifi-os-server",     "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.101",  "__param_module" = "icmp", "instance" = "dev-app-server",      "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.126",  "__param_module" = "icmp", "instance" = "master-01-rke2",      "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.127",  "__param_module" = "icmp", "instance" = "master-02-rke2",      "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.128",  "__param_module" = "icmp", "instance" = "master-03-rke2",      "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.129",  "__param_module" = "icmp", "instance" = "worker-01-rke2",      "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.130",  "__param_module" = "icmp", "instance" = "worker-02-rke2",      "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.135",  "__param_module" = "icmp", "instance" = "lb-01",               "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.136",  "__param_module" = "icmp", "instance" = "lb-02",               "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.150",  "__param_module" = "icmp", "instance" = "dev-rec-server",      "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.151",  "__param_module" = "icmp", "instance" = "prd-rec-server",      "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.191",  "__param_module" = "icmp", "instance" = "nas-01",              "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.192",  "__param_module" = "icmp", "instance" = "nas-02",              "job" = "blackbox_icmp" },
          { "__address__" = "blackbox-exporter.monitoring.svc.cluster.local:9115", "__param_target" = "192.168.20.227",  "__param_module" = "icmp", "instance" = "rke2-vip",            "job" = "blackbox_icmp" },
        ]
        metrics_path    = "/probe"
        forward_to      = [
          prometheus.remote_write.victoria_metrics.receiver,
          prometheus.remote_write.grafana_cloud.receiver,
        ]
        scrape_interval = "30s"
      }

      // ── Remote write: VictoriaMetrics (クラスタ内) ────────────────────────
      prometheus.remote_write "victoria_metrics" {
        endpoint {
          url = "http://victoria-metrics-victoria-metrics-single-server.monitoring.svc.cluster.local:8428/api/v1/write"
        }
      }

      // ── Remote write: Grafana Cloud ───────────────────────────────────────
      prometheus.remote_write "grafana_cloud" {
        endpoint {
          url = env("GRAFANA_CLOUD_METRICS_URL")
          basic_auth {
            username = env("GRAFANA_CLOUD_METRICS_USERNAME")
            password = env("GRAFANA_CLOUD_METRICS_PASSWORD")
          }
        }
      }

serviceAccount:
  create: true

rbac:
  create: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi
