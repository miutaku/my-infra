controller:
  type: daemonset
  tolerations:
    - operator: Exists
  hostPID: true
  volumes:
    extra:
      - name: rootfs
        hostPath:
          path: /
      - name: procfs
        hostPath:
          path: /proc
      - name: sysfs
        hostPath:
          path: /sys

alloy:
  clustering:
    enabled: true

  securityContext:
    privileged: true
    allowPrivilegeEscalation: true

  mounts:
    extra:
      - name: rootfs
        mountPath: /host/root
        readOnly: true
      - name: procfs
        mountPath: /host/proc
        readOnly: true
      - name: sysfs
        mountPath: /host/sys
        readOnly: true

  configMap:
    create: true
    content: |
      // ── Node metrics (unix exporter) ─────────────────────────────────────
      prometheus.exporter.unix "node" {
        rootfs_path = "/host/root"
        procfs_path = "/host/proc"
        sysfs_path  = "/host/sys"
      }

      prometheus.scrape "node" {
        targets    = prometheus.exporter.unix.node.targets
        forward_to = [prometheus.relabel.node.receiver]
        job_name        = "integrations/node_exporter"
        scrape_interval = "60s"
      }

      prometheus.relabel "node" {
        forward_to = [prometheus.remote_write.victoria_metrics.receiver]
        rule {
          target_label = "instance"
          replacement  = env("HOSTNAME")
        }
        rule {
          target_label = "node"
          replacement  = env("HOSTNAME")
        }
      }

      // ── Kubernetes pod 自動検出 ───────────────────────────────────────────
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          action        = "keep"
          regex         = "true"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          action        = "replace"
          target_label  = "__metrics_path__"
          regex         = "(.+)"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_ip", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          action        = "replace"
          target_label  = "__address__"
          separator     = ":"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "pods" {
        targets    = discovery.relabel.pods.output
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        scrape_interval = "60s"
      }

      // ── SNMP: IX2215 (snmp-exporter 経由) ────────────────────────────────
      prometheus.scrape "snmp_ix2215" {
        targets = [
          {
            "__address__"      = "snmp-exporter-prometheus-snmp-exporter.monitoring.svc.cluster.local:9116",
            "__param_target"   = "192.168.0.254",
            "__param_module"   = "ix2215",
            "__param_auth"     = "ix2215_v2",
            "instance"         = "ix2215",
            "job"              = "snmp",
          },
        ]
        metrics_path    = "/snmp"
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        scrape_interval = "60s"
      }

      // ── PVE exporter: pve-x570 / pve-b550m ───────────────────────────────
      prometheus.scrape "pve_x570" {
        targets = [
          {
            "__address__"    = "pve-exporter.monitoring.svc.cluster.local:9221",
            "__param_target" = "192.168.0.115",
            "instance"       = "pve-x570",
            "job"            = "pve",
          },
        ]
        metrics_path    = "/pve"
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        scrape_interval = "60s"
      }

      prometheus.scrape "pve_b550m" {
        targets = [
          {
            "__address__"    = "pve-exporter.monitoring.svc.cluster.local:9221",
            "__param_target" = "192.168.0.119",
            "instance"       = "pve-b550m",
            "job"            = "pve",
          },
        ]
        metrics_path    = "/pve"
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        scrape_interval = "60s"
      }

      // ── node_exporter: 非 k8s VM (static) ───────────────────────────────
      // node_exporter が各 VM にインストール済みであること (ansible/monitoring)
      prometheus.scrape "node_static" {
        targets = [
          { "__address__" = "192.168.20.101:9100", "instance" = "dev-app-server",   "job" = "node" },
          { "__address__" = "192.168.20.135:9100", "instance" = "lb-01",            "job" = "node" },
          { "__address__" = "192.168.20.136:9100", "instance" = "lb-02",            "job" = "node" },
          { "__address__" = "192.168.0.132:9100",  "instance" = "unifi-os-server",  "job" = "node" },
          { "__address__" = "192.168.40.250:9100",  "instance" = "mm-server-01",     "job" = "node" },
        ]
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        job_name        = "integrations/node_exporter"
        scrape_interval = "60s"
      }

      // ── SNMP: TrueNAS Scale (nas-01 / nas-02) ───────────────────────────────
      prometheus.scrape "snmp_truenas" {
        targets = [
          {
            "__address__"      = "snmp-exporter-prometheus-snmp-exporter.monitoring.svc.cluster.local:9116",
            "__param_target"   = "192.168.20.191",
            "__param_module"   = "truenas",
            "__param_auth"     = "truenas_v2",
            "instance"         = "nas-01",
            "job"              = "snmp_truenas",
          },
          {
            "__address__"      = "snmp-exporter-prometheus-snmp-exporter.monitoring.svc.cluster.local:9116",
            "__param_target"   = "192.168.20.192",
            "__param_module"   = "truenas",
            "__param_auth"     = "truenas_v2",
            "instance"         = "nas-02",
            "job"              = "snmp_truenas",
          },
        ]
        metrics_path    = "/snmp"
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        scrape_interval = "60s"
      }

      // ── speedtest-exporter: 回線速度計測 ─────────────────────────────────
      // speedtest 実行に約35秒かかるため scrape_interval=5m / scrape_timeout=60s
      prometheus.scrape "speedtest" {
        targets = [
          {
            "__address__" = "speedtest-exporter.monitoring.svc.cluster.local:8080",
            "instance"    = "speedtest",
            "job"         = "speedtest",
          },
        ]
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        scrape_interval = "5m"
        scrape_timeout  = "60s"
      }

      // ── blackbox-exporter: HTTP 外形監視 ─────────────────────────────────
      discovery.relabel "blackbox_http" {
        targets = [
          {
            "__address__" = "http://192.168.20.254",
            "instance"    = "ix2215",
            "job"         = "blackbox_http",
          },
          {
            "__address__" = "http://epgstation.app-epgstation.svc.cluster.local:8888/api/version",
            "instance"    = "epgstation",
            "job"         = "blackbox_http",
          },
          {
            "__address__" = "http://mirakurun.app-mirakurun.svc.cluster.local:40772/api/version",
            "instance"    = "mirakurun",
            "job"         = "blackbox_http",
          },
        ]
        rule {
          source_labels = ["__address__"]
          target_label  = "__param_target"
        }
        rule {
          target_label = "__address__"
          replacement  = "blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115"
        }
      }

      prometheus.scrape "blackbox_http" {
        targets         = discovery.relabel.blackbox_http.output
        metrics_path    = "/probe"
        params          = { "module" = ["http_2xx"] }
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        scrape_interval = "60s"
      }

      discovery.relabel "blackbox_http_insecure" {
        targets = [
          {
            "__address__" = "https://192.168.0.132:11443",
            "instance"    = "unifi-os-server",
            "job"         = "blackbox_http",
          },
        ]
        rule {
          source_labels = ["__address__"]
          target_label  = "__param_target"
        }
        rule {
          target_label = "__address__"
          replacement  = "blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115"
        }
      }

      prometheus.scrape "blackbox_http_insecure" {
        targets         = discovery.relabel.blackbox_http_insecure.output
        metrics_path    = "/probe"
        params          = { "module" = ["http_2xx_insecure"] }
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        scrape_interval = "60s"
      }

      // ── blackbox-exporter: ICMP 死活監視 ─────────────────────────────────
      discovery.relabel "blackbox_icmp" {
        targets = [
          { "__address__" = "192.168.0.254",   "instance" = "ix2215",             "job" = "blackbox_icmp" },
          { "__address__" = "192.168.0.115",   "instance" = "pve-x570",           "job" = "blackbox_icmp" },
          { "__address__" = "192.168.0.119",   "instance" = "pve-b550m",          "job" = "blackbox_icmp" },
          { "__address__" = "192.168.0.132",   "instance" = "unifi-os-server",    "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.101",  "instance" = "dev-app-server",     "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.126",  "instance" = "master-01-rke2",     "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.127",  "instance" = "master-02-rke2",     "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.128",  "instance" = "master-03-rke2",     "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.129",  "instance" = "worker-01-rke2",     "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.130",  "instance" = "worker-02-rke2",     "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.131",  "instance" = "dvb-worker-01-rke2", "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.135",  "instance" = "lb-01",              "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.136",  "instance" = "lb-02",              "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.191",  "instance" = "nas-01",             "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.192",  "instance" = "nas-02",             "job" = "blackbox_icmp" },
          { "__address__" = "192.168.20.227",  "instance" = "rke2-vip",           "job" = "blackbox_icmp" },
        ]
        rule {
          source_labels = ["__address__"]
          target_label  = "__param_target"
        }
        rule {
          target_label = "__address__"
          replacement  = "blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115"
        }
      }

      prometheus.scrape "blackbox_icmp" {
        targets         = discovery.relabel.blackbox_icmp.output
        metrics_path    = "/probe"
        params          = { "module" = ["icmp"] }
        clustering {
          enabled = true
        }
        forward_to      = [prometheus.remote_write.victoria_metrics.receiver]
        scrape_interval = "30s"
      }

      // ── Remote write: VictoriaMetrics (クラスタ内) ────────────────────────
      prometheus.remote_write "victoria_metrics" {
        endpoint {
          url = "http://victoria-metrics-victoria-metrics-single-server.monitoring.svc.cluster.local:8428/api/v1/write"
        }
      }

serviceAccount:
  create: true

rbac:
  create: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi
