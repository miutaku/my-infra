name: Build nfacctd-prometheus image

on:
  push:
    branches: [main]
    paths:
      - 'docker/nfacctd-prometheus/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/nfacctd-prometheus
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfacctd-prometheus:v1.7.9
            ghcr.io/${{ github.repository_owner }}/nfacctd-prometheus:latest
          build-args: |
            PMACCT_VERSION=v1.7.9
