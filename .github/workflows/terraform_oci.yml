name: 'Terraform CI/CD for OCI (TFC)'

on:
  push:
    branches: ['**']
    paths:
      - 'terraform/oci/**.tf'
      - 'terraform/oci/**.tfvars'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/oci/**.tf'
      - 'terraform/oci/**.tfvars'

env:
  TF_WORKING_DIR: ./terraform/oci

permissions:
  contents: read

jobs:
  plan:
    name: 'Terraform Plan (TFC)'
    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BSM CLI and fetch IX_PUBLIC_IPv4
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -fsSL "https://github.com/bitwarden/sdk-sm/releases/download/bws-v2.0.0/bws-x86_64-unknown-linux-gnu-2.0.0.zip" -o /tmp/bws.zip
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/bws.zip').extract('bws', '$HOME/bin/')"
          chmod +x "$HOME/bin/bws"
          export PATH="$HOME/bin:$PATH"
          IX_PUBLIC_IPv4=$(bws secret list | python3 -c 'import sys, json; data=json.load(sys.stdin); print(next((item.get("value") for item in data if item.get("key")=="IX_PUBLIC_IPv4"), ""))')
          if [ -z "$IX_PUBLIC_IPv4" ]; then
            echo 'BSM secret IX_PUBLIC_IPv4 was not found or is empty' >&2
            exit 1
          fi
          echo "TF_VAR_ix_public_ipv4=$IX_PUBLIC_IPv4" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color > /dev/null

  apply:
    name: 'Terraform Apply (TFC)'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BSM CLI and fetch IX_PUBLIC_IPv4
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -fsSL "https://github.com/bitwarden/sdk-sm/releases/download/bws-v2.0.0/bws-x86_64-unknown-linux-gnu-2.0.0.zip" -o /tmp/bws.zip
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/bws.zip').extract('bws', '$HOME/bin/')"
          chmod +x "$HOME/bin/bws"
          export PATH="$HOME/bin:$PATH"
          IX_PUBLIC_IPv4=$(bws secret list | python3 -c 'import sys, json; data=json.load(sys.stdin); print(next((item.get("value") for item in data if item.get("key")=="IX_PUBLIC_IPv4"), ""))')
          if [ -z "$IX_PUBLIC_IPv4" ]; then
            echo 'BSM secret IX_PUBLIC_IPv4 was not found or is empty' >&2
            exit 1
          fi
          echo "TF_VAR_ix_public_ipv4=$IX_PUBLIC_IPv4" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -no-color > /dev/null
