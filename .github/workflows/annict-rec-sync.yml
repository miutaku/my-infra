name: 'annict-rec-sync image'

permissions:
  contents: write
  packages: write

on:
  push:
    branches: [main]
    paths:
      - 'docker/annict-rec-sync/**'
  pull_request:
    branches: [main]
    paths:
      - 'docker/annict-rec-sync/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/annict-rec-sync

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/annict-rec-sync
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Kustomize
        if: github.event_name == 'push'
        uses: imranismail/setup-kustomize@v2

      - name: Bump image tag and commit (GitOps)
        if: github.event_name == 'push'
        run: |
         set -euo pipefail
         
         TAG="${GITHUB_SHA:0:7}"
         BRANCH="deploy/annict-rec-sync-${TAG}"
         
         git config user.name "github-actions[bot]"
         git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
         
         git switch -c "$BRANCH"
         
         cd k8s/pve/annict-rec-sync
         
         kustomize edit set image \
           ghcr.io/miutaku/annict-rec-sync=ghcr.io/miutaku/annict-rec-sync:"$TAG"

         cd "$GITHUB_WORKSPACE"

         git add k8s/pve/annict-rec-sync/kustomization.yaml
         
         if git diff --staged --quiet; then
           echo "image tag unchanged; nothing to commit"
           exit 0
         fi
         
         git commit -m "chore(annict-rec-sync): deploy image ${TAG}"
         
         git push --set-upstream origin "$BRANCH"
         
         gh pr create \
           --base main \
           --head "$BRANCH" \
           --title "chore(annict-rec-sync): deploy image ${TAG}" \
           --body "Update annict-rec-sync image to \`${TAG}\`."
