name: 'Terraform CI/CD for home PVE (TFC)'

on:
  push:
    branches: ['**']
    paths:
      - 'terraform/pve/**.tf'
      - 'terraform/pve/**.tfvars'
      - 'terraform/pve/templates/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/pve/**.tf'
      - 'terraform/pve/**.tfvars'
      - 'terraform/pve/templates/**'

env:
  TF_WORKING_DIR: ./terraform/pve

permissions:
  contents: write

jobs:
  plan:
    name: 'Terraform Plan (TFC)'
    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color > /dev/null

  apply:
    name: 'Terraform Apply (TFC)'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -no-color > /dev/null

      - name: Commit generated Ansible inventory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ansible/rke2/hosts/prd ansible/rke2/group_vars/prd-all.yml
          git diff --staged --quiet || git commit -m "chore(ansible): auto-update RKE2 inventory from terraform output"
          git push
