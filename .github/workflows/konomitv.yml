name: KonomiTV image

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/konomitv.yml
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/konomitv.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/konomitv
  KONOMITV_VERSION: 0.14.1

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out KonomiTV stable release
        uses: actions/checkout@v4
        with:
          repository: tsukumijima/KonomiTV
          ref: v${{ env.KONOMITV_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push pinned stable image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.KONOMITV_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
