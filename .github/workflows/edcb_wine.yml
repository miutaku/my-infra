name: EDCB-Wine image

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/edcb_wine.yml
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/edcb_wine.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/edcb-wine
  # EDCB-Wine has no releases. Pin the verified upstream revision instead.
  EDCB_WINE_REVISION: bb0b4005a9d9c7a6b67411dbb9e9b6255af34b0c

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out EDCB-Wine
        uses: actions/checkout@v4
        with:
          repository: tsukumijima/EDCB-Wine
          ref: ${{ env.EDCB_WINE_REVISION }}

      - name: Configure the Wine recording drive
        run: |
          cp wine-mount.example.sh wine-mount.sh
          printf '%s\n' 'ln -s "/mnt/hdd-record/" "d:"' >> wine-mount.sh
          # Upstream Compose bind-mounts ./EDCB at runtime. Kubernetes needs the
          # pristine files in the image so the init container can seed its PVC.
          sed -i '/^EDCB\/$/d' .dockerignore
          printf '%s\n' 'COPY --chown=ubuntu:ubuntu ./EDCB/ /EDCB/' >> Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push pinned image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:bb0b400-r2
          cache-from: type=gha
          cache-to: type=gha,mode=max
