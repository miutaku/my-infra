name: 'Terraform CI/CD for OCI PRD (TFC)'

on:
  push:
    branches: ['**']
    paths:
      - 'terraform/oci-prd/**.tf'
      - 'terraform/oci-prd/**.tfvars'
    tags:
      - 'oci-prd-v*'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/oci-prd/**.tf'
      - 'terraform/oci-prd/**.tfvars'
  workflow_dispatch:

env:
  TF_WORKING_DIR: ./terraform/oci-prd

permissions:
  contents: read

jobs:
  plan:
    name: 'Terraform Plan (TFC)'
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color > /dev/null

  apply:
    name: 'Terraform Apply (TFC)'
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/oci-prd-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -no-color > /dev/null
