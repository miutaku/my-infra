name: 'Terraform CI/CD for Cloudflare (TFC)'

on:
  push:
    branches: ['**']
    paths:
      - 'terraform/cloudflare/**.tf'
      - 'terraform/cloudflare/**.tfvars'
      - 'terraform/cloudflare/.terraform.lock.hcl'
      - '.github/workflows/terraform_cloudflare.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/cloudflare/**.tf'
      - 'terraform/cloudflare/**.tfvars'
      - 'terraform/cloudflare/.terraform.lock.hcl'
      - '.github/workflows/terraform_cloudflare.yml'

env:
  TF_WORKING_DIR: ./terraform/cloudflare
  TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/terraform-plugin-cache

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: 'Terraform Plan (TFC)'
    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Prepare Terraform plugin cache
        run: mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-cloudflare-${{ runner.os }}-${{ hashFiles('terraform/cloudflare/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-cloudflare-${{ runner.os }}-

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          for attempt in 1 2 3; do
            terraform init && exit 0
            sleep $((attempt * 10))
          done
          terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color > /dev/null

  apply:
    name: 'Terraform Apply (TFC)'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Prepare Terraform plugin cache
        run: mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-cloudflare-${{ runner.os }}-${{ hashFiles('terraform/cloudflare/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-cloudflare-${{ runner.os }}-

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          for attempt in 1 2 3; do
            terraform init && exit 0
            sleep $((attempt * 10))
          done
          terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -no-color > /dev/null
