---
- name: Configure system base (timezone/logging/NTP/SNMP/SSH/HTTP/VRRP/bridge-IRB/DHCP-enable)
  ansible.builtin.command:
    cmd: python3 scripts/configure_system_base.py
    chdir: "{{ playbook_dir }}"
  environment:
    IX2215_HOST: "{{ ix2215_host }}"
    IX2215_USER: "{{ ix2215_user }}"
    IX2215_PASSWORD: "{{ ix2215_ssh_password.stdout | trim }}"
    DRY_RUN: "{{ 'true' if ansible_check_mode else 'false' }}"
    IX_TIMEZONE: "{{ ix_timezone }}"
    IX_LOGGING_JSON: "{{ ix_logging | to_json }}"
    IX_NTP_SERVERS_JSON: "{{ ix_ntp.servers | to_json }}"
    IX_SNMP_COMMUNITIES_JSON: "{{ ix_snmp.communities | to_json }}"
    IX_SYSTEM_SERVICES_JSON: "{{ ix_system_services | to_json }}"
  register: result
  changed_when: "'changed=true' in result.stdout"
  failed_when: "'failed=true' in result.stdout or result.rc != 0"
  check_mode: false

- name: Show result
  ansible.builtin.debug:
    msg: "{{ result.stdout }}"
