  - name: lb-01-rke2-haproxy-keepalived
    ip: "192.168.0.135"
    mac: "BC:24:11:AD:44:01"
  - name: lb-02-rke2-haproxy-keepalived
    ip: "192.168.0.136"
    mac: "BC:24:11:AD:44:02"
  - name: master-01-rke2-server
    ip: "192.168.0.126"
    mac: "BC:24:11:97:96:01"
  - name: master-02-rke2-server
    ip: "192.168.0.127"
    mac: "BC:24:11:97:96:02"
