# ---------------------------------------------------------------------------
# DHCPv6
# ---------------------------------------------------------------------------
ix_dhcpv6_client_profiles:
  - name: "dhcpv6-cl"
    information_request: true
    option_request: "dns-servers"

ix_dhcpv6_server_profiles:
  - name: "dhcpv6-sv"
    dns_server: "dhcp"

# ---------------------------------------------------------------------------
# DDNS (v6プラス固定IP 更新用)
# ---------------------------------------------------------------------------
bsm_ix2215_ddns_query_id: "28ed26db-308d-4903-83e5-b444009cbe2a" # user=xxxxx@pass=yyyy のクエリを返すシークレット

ix_ddns_enable: true
ix_ddns_profiles:
  - name: "v6plus-update"
    url: "http://fcs.enabler.ne.jp/update"
    # query は site.yml の pre_task で BSM から取得した値 (ix2215_ddns_query.stdout) を使用
    transport: "ipv6"
    source_interface: "GigaEthernet2.0"
    update_interval: 10

# ---------------------------------------------------------------------------
# OCI Site-to-Site VPN (IKEv2 IPSec)
# ---------------------------------------------------------------------------
# oci_tunnel_ip と cpe_inside_ip は BSM から取得し、site.yml の pre_task で
# ix_vpn_oci_dynamic として set_fact する。IP アドレスは公開リポジトリに書かない。
bsm_oci_tunnel_ip_id:  "45f64523-0ffa-4ae8-b8fe-b453006fb8a3"  # BSM: OCI_VPN_TUNNEL1_IP
bsm_cpe_inside_ip_id:  "35157db9-7b9c-4296-9505-b453007385bb"  # BSM: CPE_INSIDE_IP

ix_vpn_oci:
  outgoing_interface: "Tunnel0.0"   # IX2215 の WAN (v6plus MAP-E トンネル)
  oci_vcn_cidr: "10.0.0.0/16"
  # oci_tunnel_ip / cpe_inside_ip / psk は site.yml の pre_task で BSM から注入される

# ---------------------------------------------------------------------------
# Interfaces
# ---------------------------------------------------------------------------
ix_interfaces:
  - name: "GigaEthernet0.0"
    description: ~
    ip_address: ~
    ipv6_enable: true
    ipv6_dhcp_client: "dhcpv6-cl"
    ipv6_nd_proxy: "GigaEthernet2.0"
    ipv6_filters_in:
      - { seq: 1, list: "dhcpv6-list" }
      - { seq: 2, list: "icmpv6-list" }
      - { seq: 3, list: "tunnel-list" }
      - { seq: 100, list: "block-list" }
    ipv6_filters_out:
      - { seq: 1, list: "dhcpv6-list" }
      - { seq: 2, list: "icmpv6-list" }
      - { seq: 3, list: "tunnel-list" }
      - { seq: 100, list: "dflt-list" }
    shutdown: false

  - name: "GigaEthernet1.0"
    shutdown: true

  - name: "GigaEthernet2.0"
    description: "MainLAN_AP_trunk_untag"
    ip_address: "192.168.0.254/24"
    ip_dhcp_binding: "main"
    ipv6_enable: true
    ipv6_interface_identifier: "{{ ix2215_ipv6_iid.stdout | trim }}"
    ipv6_dhcp_server: "dhcpv6-sv"
    bridge_group: 1
    http_server_ip_enable: true
    shutdown: false

  - name: "GigaEthernet2.31"
    description: "GuestLAN_AP_tagged_vlan31"
    encapsulation: "dot1q 31 tpid 8100"
    auto_connect: true
    bridge_group: 31
    shutdown: false

  - name: "GigaEthernet2.10"
    description: "MgmtLAN_AP_tagged_vlan10"
    encapsulation: "dot1q 10 tpid 8100"
    auto_connect: true
    bridge_group: 10
    shutdown: false

  - name: "GigaEthernet2.20"
    description: "ServerLAN_AP_tagged_vlan20"
    encapsulation: "dot1q 20 tpid 8100"
    auto_connect: true
    bridge_group: 20
    shutdown: false

  - name: "GigaEthernet2.30"
    description: "ClientLAN_AP_tagged_vlan30"
    encapsulation: "dot1q 30 tpid 8100"
    auto_connect: true
    bridge_group: 30
    shutdown: false

  - name: "GigaEthernet2.4"
    description: "IoTLAN_AP_tagged_vlan40"
    encapsulation: "dot1q 40 tpid 8100"
    auto_connect: true
    bridge_group: 4
    shutdown: false

  - name: "BVI31"
    description: "GuestLAN_Interface"
    ip_address: "192.168.31.254/24"
    # ip_dhcp_binding はグローバルの "ip dhcp binding guest" で代替 (BVI4 と同様)
    ip_filter_in: { seq: 1, list: "guest-acl" }
    bridge_group: 31
    shutdown: false

  - name: "BVI10"
    description: "MgmtLAN_Interface"
    ip_address: "192.168.10.254/24"
    ip_dhcp_binding: "vlan10"
    bridge_group: 10
    http_server_ip_enable: true
    shutdown: false

  - name: "BVI20"
    description: "ServerLAN_Interface"
    ip_address: "192.168.20.254/24"
    ip_dhcp_binding: "vlan20"
    bridge_group: 20
    shutdown: false

  - name: "BVI30"
    description: "ClientLAN_Interface"
    ip_address: "192.168.30.254/24"
    ip_dhcp_binding: "vlan30"
    bridge_group: 30
    shutdown: false

  - name: "BVI4"
    description: "IoTLAN_Interface"
    ip_address: "192.168.40.254/24"
    # ip_dhcp_binding はグローバルの "ip dhcp binding vlan40" で代替
    # NEC IX2215 は bridge-group 4 の BVI でインターフェース固有バインディングを保持できない?
    bridge_group: 4
    shutdown: false

  - name: "Tunnel0.0"
    tunnel_mode: "4-over-6"
    tunnel_destination: "{{ ix2215_tunnel_dest.stdout | trim }}"
    tunnel_source: "GigaEthernet2.0"
    ip_address: "{{ ix2215_tunnel_ip.stdout | trim }}/32"
    ip_tcp_adjust_mss: "auto"
    ip_napt_enable: true
    ip_napt_eim_mode: true
    shutdown: false

  - name: "Tunnel1.0"
    tunnel_mode: "4-over-6"
    tunnel_destination: "fqdn wtd01-aftr01-ngnintf.i.open.ad.jp"
    tunnel_source: "GigaEthernet2.0"
    ip_unnumbered: "GigaEthernet2.0"
    ip_tcp_adjust_mss: "auto"
    shutdown: false

  # OCI Site-to-Site VPN (IKEv2 IPSec)
  # terraform apply 後に ix_vpn_oci の oci_tunnel_ip と cpe_inside_ip を確定させてから実行すること
  - name: "Tunnel2.0"
    tunnel_mode: "ipsec-ikev2"
    ip_address: "{{ ix_vpn_oci.cpe_inside_ip }}"
    ip_tcp_adjust_mss: "auto"
    ikev2_child_pfs: "1536-bit"
    ikev2_child_proposals:
      - "enc aes-cbc-256"
      - "integrity sha2-256"
    ikev2_sa_proposals:
      - "enc aes-cbc-256"
      - "integrity sha2-384"
      - "dh 1536-bit"
    ikev2_connect_type: "auto"
    ikev2_ipsec_pre_fragment: true
    ikev2_outgoing_interface: "{{ ix_vpn_oci.outgoing_interface }}"
    ikev2_peer: "{{ ix_vpn_oci.oci_tunnel_ip }}"
    shutdown: false
