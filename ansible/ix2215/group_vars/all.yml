# ---------------------------------------------------------------------------
# DHCPv6
# ---------------------------------------------------------------------------
ix_dhcpv6_client_profiles:
  - name: "dhcpv6-cl"
    information_request: true
    option_request: "dns-servers"

ix_dhcpv6_server_profiles:
  - name: "dhcpv6-sv"
    dns_server: "dhcp"

# ---------------------------------------------------------------------------
# map-e (Tunnel0.0) - ikev2 default-profile
# ---------------------------------------------------------------------------
ix_map_e_ikev2:
  dpd_interval: 10
  source_address: "Tunnel0.0"

# ---------------------------------------------------------------------------
# Interfaces
# ---------------------------------------------------------------------------
ix_interfaces:
  - name: "GigaEthernet0.0"
    description: ~
    ip_address: ~
    ipv6_enable: true
    ipv6_dhcp_client: "dhcpv6-cl"
    ipv6_nd_proxy: "GigaEthernet2.0"
    ipv6_filters_in:
      - { seq: 1, list: "dhcpv6-list" }
      - { seq: 2, list: "icmpv6-list" }
      - { seq: 3, list: "tunnel-list" }
      - { seq: 100, list: "block-list" }
    ipv6_filters_out:
      - { seq: 1, list: "dhcpv6-list" }
      - { seq: 2, list: "icmpv6-list" }
      - { seq: 3, list: "tunnel-list" }
      - { seq: 100, list: "dflt-list" }
    shutdown: false

  - name: "GigaEthernet1.0"
    shutdown: true

  - name: "GigaEthernet2.0"
    description: "MainLAN_AP_trunk_untag"
    ip_address: "192.168.0.254/24"
    ip_dhcp_binding: "main"
    ipv6_enable: true
    ipv6_dhcp_server: "dhcpv6-sv"
    ipv6_nd_ra: true
    ipv6_nd_ra_other_config_flag: true
    bridge_group: 1
    http_server_ip_enable: true
    shutdown: false

  - name: "GigaEthernet2.8"
    description: "GuestLAN_AP_tagged_vlan8"
    encapsulation: "dot1q 8 tpid 8100"
    auto_connect: true
    bridge_group: 8
    shutdown: false

  - name: "BVI8"
    description: "GuestLAN_Interface"
    ip_address: "192.168.8.254/24"
    ip_dhcp_binding: "guest"
    ip_filter_in: { seq: 1, list: "guest-acl" }
    bridge_group: 8
    shutdown: false

  - name: "Tunnel0.0"
    tunnel_mode: "map-e"
    ip_address: "map-e"
    ip_tcp_adjust_mss: "auto"
    ip_napt_enable: true
    ip_napt_eim_mode: true
    shutdown: false
