---
ix2215_host: "192.168.0.254"
ix2215_user: "miutaku"

# BSM シークレット ID (bws secret list で確認)
bsm_ix2215_ssh_password_id: "ad6bded6-0308-443e-964e-b43b00fab5d5"

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------
ix_timezone: "+09 00"

ix_logging:
  - "subsystem ike info"
  - "timestamp datetime"

ix_ntp:
  enable: true
  servers:
    - "61.205.120.130" # ntp.nict.jp

ix_snmp:
  communities:
    - "monitor"
    - "public"

ix_system_services:
  ssh_server_ip: true
  vrrp: true
  bridge_irb: true
  ip_dhcp: true
  ipv6_dhcp: true
  http_server_ip: true
  http_server_username: "miutaku"
  nm_ip: true

# ---------------------------------------------------------------------------
# DNS
# ---------------------------------------------------------------------------
ix_dns_servers_v4:
  - "1.1.1.1" # Cloudflare DNS
  - "1.0.0.1" # Cloudflare DNS
  - "8.8.8.8" # Google DNS
  - "8.8.4.4" # Google DNS

ix_dns_servers_v6:
  - "2001:4860:4860::8888" # Google DNS
  - "2001:4860:4860::8844" # Google DNS
  - "2606:4700:4700::1111" # Cloudflare DNS
  - "2606:4700:4700::1001" # Cloudflare DNS

ix_dns_cache:
  enable: true
  max_records: 512
  lifetime: 300
  ncache_lifetime: 60

ix_proxy_dns:
  ip_enable: true
  ip_request: "both"
  ipv6_enable: true

# ---------------------------------------------------------------------------
# IP routing & UFS cache
# ---------------------------------------------------------------------------
ix_ufs_cache:
  max_entries: 100000

ix_ipv6_ufs_cache:
  max_entries: 65535

ix_static_routes_v4:
  - dest: "default"
    gw: "GigaEthernet0.1"
  - dest: "default"
    gw: "Tunnel0.0"

# ---------------------------------------------------------------------------
# IP access lists
# ---------------------------------------------------------------------------
ix_access_lists: []

ix_ipv6_access_lists:
  - name: "block-list"
    entries:
      - "deny ip src any dest any"
  - name: "dhcpv6-list"
    entries:
      - "permit udp src any sport any dest any dport eq 546"
      - "permit udp src any sport any dest any dport eq 547"
  - name: "icmpv6-list"
    entries:
      - "permit icmp src any dest any"
  - name: "other-list"
    entries:
      - "permit ip src any dest any"
  - name: "tunnel-list"
    entries:
      - "permit 4 src any dest any"
  - name: "dynamic"
    special:
      - "cache 65535"
      - "dflt-list access other-list"

# ---------------------------------------------------------------------------
# DHCP profiles
# ---------------------------------------------------------------------------
dhcp_profile: "main"

ix_dhcp_profiles:
