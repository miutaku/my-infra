---
ix2215_host: "192.168.0.254"
ix2215_user: "miutaku"

# BSM シークレット ID (bws secret list で確認)
bsm_ix2215_ssh_password_id:           "ad6bded6-0308-443e-964e-b43b00fab5d5"
bsm_ix2215_ipv6_iid_id:              "24501c2d-377c-4b1e-a440-b444009d4216" # GigaEthernet2.0 ipv6 interface-identifier
bsm_ix2215_tunnel_dest_id:           "4885fba3-09a3-4e3c-b82e-b444009ed122" # Tunnel0.0 tunnel destination (IPv6)
bsm_ix2215_tunnel_ip_id:             "50e7e234-91ee-41e9-a205-b444009f0d6f" # Tunnel0.0 ip address (固定IPv4) / OCI CPE IP と同値
bsm_ix2215_nm_account_password_id:   "8f60d05d-b913-46c2-b591-b44c00885135"
bsm_ix2215_vpn_psk_id:               "cc057694-c97f-4433-ab95-b452016b6f9e"  # BSM: VPN_OCI_PSK

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------
ix_timezone: "+09 00"

ix_logging:
  - "buffered 131072"
  - "subsystem all warn"
  - "timestamp datetime"

ix_ntp:
  enable: true
  servers:
    - "61.205.120.130" # ntp.nict.jp

ix_snmp:
  communities:
    - "monitor"
    - "public"

ix_system_services:
  ssh_server_ip: true
  vrrp: true
  bridge_irb: true
  ip_dhcp: true
  ipv6_dhcp: true
  http_server_ip: true
  http_server_username: "miutaku"
  nm_ip: true

# グローバルレベルの ip dhcp binding (BVI に binding がない VLAN 向け)
ix_dhcp_global_bindings:
  - "vlan40"  # BVI4 は bridge-group 4 binding が不安定なためグローバルで管理
  - "guest"   # BVI31 はグローバル binding で DHCP を提供

# UTM グループ (NEC IX の utm group 設定)
ix_utm_groups:
  - id: 1
    description: "myhome-miutaku"

# NM アカウント (nm account コマンド。パスワードは BSM 管理)
ix_nm_account:
  name: "myhome-miutaku"

# ---------------------------------------------------------------------------
# DNS
# ---------------------------------------------------------------------------
ix_dns_servers_v4:
  - "1.1.1.1" # Cloudflare DNS
  - "1.0.0.1" # Cloudflare DNS
  - "8.8.8.8" # Google DNS
  - "8.8.4.4" # Google DNS

ix_dns_servers_v6:
  - "2001:4860:4860::8888" # Google DNS
  - "2001:4860:4860::8844" # Google DNS
  - "2606:4700:4700::1111" # Cloudflare DNS
  - "2606:4700:4700::1001" # Cloudflare DNS
  - "2404:1a8:7f01:a::3"   # NTT-East DNS
  - "2404:1a8:7f01:b::3"   # NTT-East DNS

ix_dns_cache:
  enable: true
  max_records: 512
  lifetime: 300
  ncache_lifetime: 60

ix_proxy_dns:
  ip_enable: true
  ip_request: "both"
  ipv6_enable: true

# ---------------------------------------------------------------------------
# IP routing & UFS cache
# ---------------------------------------------------------------------------
ix_ufs_cache:
  max_entries: 100000

ix_ipv6_ufs_cache:
  max_entries: 65535

ix_static_routes_v4:
  - dest: "default"
    gw: "Tunnel0.0"
  # OCI VCN → Tunnel2.0 (IPSec VPN) 経由でルーティング
  - dest: "10.0.0.0/16"
    gw: "Tunnel2.0"

ix_ip_prefix_lists:
  - "as-path-in 10 permit any"
  - "as-path-out 10 permit any"

# ---------------------------------------------------------------------------
# IP access lists
# ---------------------------------------------------------------------------
ix_access_lists:
  - name: "guest-acl"
    entries:
      # DHCP Discover/Request: IP取得前は src=0.0.0.0 → broadcast のため個別許可
      - "5 permit ip src 0.0.0.0/32 dest 255.255.255.255/32"
      # 自サブネット内通信を全許可 (DHCP Renew / DNS / ICMP to GW をまとめて解決)
      # 192.168.31.x → 192.168.31.254 の全プロトコルを許可することで
      # rule 20 の deny 192.168.0.0/16 に含まれる問題も回避できる
      - "10 permit ip src 192.168.31.0/24 dest 192.168.31.0/24"
      # 他の内部ネットワークへのアクセスを拒否
      - "20 deny ip src 192.168.31.0/24 dest 192.168.0.0/16"
      - "21 deny ip src 192.168.31.0/24 dest 10.0.0.0/8"
      - "22 deny ip src 192.168.31.0/24 dest 172.16.0.0/12"
      # インターネットへのアクセスを許可
      - "100 permit ip src any dest any"

ix_ipv6_access_lists:
  - name: "block-list"
    entries:
      - "deny ip src any dest any"
  - name: "dhcpv6-list"
    entries:
      - "permit udp src any sport any dest any dport eq 546"
      - "permit udp src any sport any dest any dport eq 547"
  - name: "icmpv6-list"
    entries:
      - "permit icmp src any dest any"
  - name: "other-list"
    entries:
      - "permit ip src any dest any"
  - name: "tunnel-list"
    entries:
      - "permit 4 src any dest any"
  - name: "dynamic"
    special:
      - "cache 65535"
      - "dflt-list access other-list"

# ---------------------------------------------------------------------------
# DHCP profiles
# ---------------------------------------------------------------------------
# dhcp_profile は dhcp_assignments (RKE2 ノード) を登録するプロファイル名
dhcp_profile: "vlan20"

ix_dhcp_profiles:
  # ------------------------------------------------------------------
  # main: native vlan (192.168.0.0/24)
  # IX2215 に直接接続される機器など
  # ------------------------------------------------------------------
  - name: "main"
    assignable_range: "192.168.0.1 192.168.0.50"
    domain_name: "miutaku.internal"
    dns_server:
      - "192.168.20.201"  # CoreDNS (primary)
      - "192.168.0.254"   # BVI (secondary)
    fixed_assignments:
      - { ip: "192.168.0.115", mac: "70:85:c2:da:b6:e1" } # pve-x570
      - { ip: "192.168.0.119", mac: "a8:a1:59:57:ce:43" } # pve-b550m
      - { ip: "192.168.0.132", mac: "bc:24:11:10:20:01" } # dedicated UniFi OS Server VM
      - { ip: "192.168.0.252", mac: "18:e8:29:b3:48:f7" } # US-8-60W
      - { ip: "192.168.0.253", mac: "e4:3e:c6:34:1c:00" } # FS AP （native vlanがVLAN1固定のため main プロファイルで管理）

  # ------------------------------------------------------------------
  # guest: 来客ネットワーク (192.168.31.0/24) VLAN 31
  # BVI31 に guest-acl (in) を適用し他 VLAN への横断を遮断
  # ------------------------------------------------------------------
  - name: "guest"
    assignable_range: "192.168.31.1 192.168.31.254"
    default_gateway: "192.168.31.254"
    dns_server:
      - "1.1.1.1"
      - "8.8.8.8"

  # ------------------------------------------------------------------
  # VLAN 10: 管理ネットワーク (192.168.10.0/24)
  # PVE ノード / RPi / nanokvm / CE LINK NIC
  # ------------------------------------------------------------------
  - name: "vlan10"
    assignable_range: "192.168.10.1 192.168.10.50"
    domain_name: "miutaku.internal"
    dns_server:
      - "192.168.20.201"  # CoreDNS (primary)
      - "192.168.10.254"  # BVI10 (secondary)
    fixed_assignments:
      - { ip: "192.168.10.107", mac: "dc:a6:32:f4:3e:e7" } # RPi4 4GB eth0
      - { ip: "192.168.10.108", mac: "dc:a6:32:f4:3e:e9" } # RPi4 4GB wlan0
      - { ip: "192.168.10.109", mac: "dc:a6:32:a0:3f:93" } # RPi4 2GB eth0
      - { ip: "192.168.10.110", mac: "dc:a6:32:a0:3f:94" } # RPi4 2GB wlan0
      - { ip: "192.168.10.112", mac: "b8:27:eb:54:33:22" } # RPiB+ eth0 (#1)
      - { ip: "192.168.10.113", mac: "b8:27:eb:b6:c1:8b" } # RPiB+ eth0 (#2)
      - { ip: "192.168.10.117", mac: "e0:51:d8:10:35:e4" } # nucbox-3 NIC1
      - { ip: "192.168.10.118", mac: "80:b6:55:62:4e:59" } # nucbox-3 NIC2
      - { ip: "192.168.10.140", mac: "a0:ce:c8:d6:20:64" } # CE LINK NIC
      - { ip: "192.168.10.240", mac: "48:da:35:6f:c6:70" } # nanokvm #1
      - { ip: "192.168.10.241", mac: "48:da:35:6f:b6:8b" } # nanokvm #2
      - { ip: "192.168.10.252", mac: "18:e8:29:b3:48:f7" } # US-8-60W (VLAN10 mgmt)

  # ------------------------------------------------------------------
  # VLAN 20: サーバネットワーク (192.168.20.0/24)
  # VM サーバ / RKE2 クラスタ / NAS
  # MetalLB プール: 192.168.20.200-226
  # Keepalived VIP:  192.168.20.227
  # ------------------------------------------------------------------
  - name: "vlan20"
    assignable_range: "192.168.20.1 192.168.20.50"
    domain_name: "miutaku.internal"
    dns_server:
      - "192.168.20.201"  # CoreDNS (primary)
      - "192.168.20.254"  # BVI20 (secondary)
    fixed_assignments:
      - { ip: "192.168.20.101", mac: "52:54:00:25:01:01" } # dev-app-server
      - { ip: "192.168.20.126", mac: "bc:24:11:97:96:01" } # master-01 (RKE2 server)
      - { ip: "192.168.20.127", mac: "bc:24:11:97:96:02" } # master-02 (RKE2 server)
      - { ip: "192.168.20.128", mac: "bc:24:11:97:96:03" } # master-03 (RKE2 server)
      - { ip: "192.168.20.129", mac: "bc:24:11:23:32:01" } # worker-01 (RKE2 agent)
      - { ip: "192.168.20.130", mac: "bc:24:11:23:32:02" } # worker-02 (RKE2 agent)
      - { ip: "192.168.20.131", mac: "bc:24:11:23:32:90" } # dvb-worker (RKE2 agent, PT3 passthrough)
      - { ip: "192.168.20.135", mac: "bc:24:11:ad:44:01" } # lb-01 (RKE2 LB)
      - { ip: "192.168.20.136", mac: "bc:24:11:ad:44:02" } # lb-02 (RKE2 LB)
      - { ip: "192.168.20.191", mac: "52:54:00:24:99:02" } # nas-01 (TrueNAS Scale)
      - { ip: "192.168.20.192", mac: "52:54:00:24:99:01" } # nas-02 (TrueNAS Scale)

  # ------------------------------------------------------------------
  # VLAN 30: クライアントネットワーク (192.168.30.0/24)
  # PC / Windows VM / 謎NIC 類
  # ------------------------------------------------------------------
  - name: "vlan30"
    assignable_range: "192.168.30.1 192.168.30.200"
    domain_name: "miutaku.internal"
    dns_server:
      - "192.168.20.201"  # CoreDNS (primary)
      - "192.168.30.254"  # BVI30 (secondary)
    fixed_assignments:
