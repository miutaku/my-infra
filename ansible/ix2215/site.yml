---
- name: Configure IX2215
  hosts: ix2215
  gather_facts: false
  strategy: linear
  pre_tasks:
    - name: Get IX2215 SSH password from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_ssh_password_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_ssh_password
      changed_when: false
      check_mode: false
      no_log: true

    - name: Get DDNS query string from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_ddns_query_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_ddns_query
      changed_when: false
      check_mode: false
      no_log: true
      when: bsm_ix2215_ddns_query_id | length > 0

    - name: Get GigaEthernet2.0 IPv6 interface-identifier from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_ipv6_iid_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_ipv6_iid
      changed_when: false
      check_mode: false
      no_log: true

    - name: Get Tunnel0.0 destination (IPv6) from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_tunnel_dest_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_tunnel_dest
      changed_when: false
      check_mode: false
      no_log: true

    - name: Get Tunnel0.0 fixed IPv4 address from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_tunnel_ip_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_tunnel_ip
      changed_when: false
      check_mode: false
      no_log: true

  roles:
    - system_base
    - dns_config
    - static_routes
    - access_lists
    - dhcp_profiles
    - dhcp_static_lease
    - interfaces
    - ddns_config

  tasks:
    - name: Remove stale entries from main DHCP profile
      ansible.builtin.command:
        cmd: python3 scripts/configure_dhcp_leases.py
        chdir: "{{ playbook_dir }}"
      environment:
        IX2215_HOST: "{{ ix2215_host }}"
        IX2215_USER: "{{ ix2215_user }}"
        IX2215_PASSWORD: "{{ ix2215_ssh_password.stdout | trim }}"
        DHCP_PROFILE: "main"
        DHCP_ASSIGNMENTS_JSON: "[]"
        DHCP_REMOVE_IPS: "192.168.0.121,192.168.0.122,192.168.0.191,192.168.0.192"
        DRY_RUN: "{{ 'true' if ansible_check_mode else 'false' }}"
      register: main_cleanup_result
      changed_when: "'changed=true' in main_cleanup_result.stdout"
      failed_when: "'failed=true' in main_cleanup_result.stdout or main_cleanup_result.rc != 0"
      check_mode: false

    - name: Show main profile cleanup result
      ansible.builtin.debug:
        msg: "{{ main_cleanup_result.stdout }}"

    - name: Remove stale worker-nw-01 entry from vlan10 DHCP profile
      ansible.builtin.command:
        cmd: python3 scripts/configure_dhcp_leases.py
        chdir: "{{ playbook_dir }}"
      environment:
        IX2215_HOST: "{{ ix2215_host }}"
        IX2215_USER: "{{ ix2215_user }}"
        IX2215_PASSWORD: "{{ ix2215_ssh_password.stdout | trim }}"
        DHCP_PROFILE: "vlan10"
        DHCP_ASSIGNMENTS_JSON: "[]"
        DHCP_REMOVE_IPS: "192.168.10.131"
        DRY_RUN: "{{ 'true' if ansible_check_mode else 'false' }}"
      register: vlan10_cleanup_result
      changed_when: "'changed=true' in vlan10_cleanup_result.stdout"
      failed_when: "'failed=true' in vlan10_cleanup_result.stdout or vlan10_cleanup_result.rc != 0"
      check_mode: false

    - name: Show vlan10 profile cleanup result
      ansible.builtin.debug:
        msg: "{{ vlan10_cleanup_result.stdout }}"

  post_tasks:
    - name: Fetch running-config for verification
      ansible.builtin.command:
        cmd: python3 scripts/fetch_running_config.py
        chdir: "{{ playbook_dir }}"
      environment:
        IX2215_HOST: "{{ ix2215_host }}"
        IX2215_USER: "{{ ix2215_user }}"
        IX2215_PASSWORD: "{{ ix2215_ssh_password.stdout | trim }}"
      register: running_config
      changed_when: false
      check_mode: false

    - name: Show running-config
      ansible.builtin.debug:
        msg: "{{ running_config.stdout }}"
