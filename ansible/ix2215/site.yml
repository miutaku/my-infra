---
- name: Configure IX2215
  hosts: ix2215
  gather_facts: false
  strategy: linear
  pre_tasks:
    - name: Get IX2215 SSH password from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_ssh_password_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_ssh_password
      changed_when: false
      check_mode: false
      no_log: true

    - name: Get DDNS query string from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_ddns_query_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_ddns_query
      changed_when: false
      check_mode: false
      no_log: true
      when: bsm_ix2215_ddns_query_id | length > 0

    - name: Get GigaEthernet2.0 IPv6 interface-identifier from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_ipv6_iid_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_ipv6_iid
      changed_when: false
      check_mode: false
      no_log: true

    - name: Get Tunnel0.0 destination (IPv6) from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_tunnel_dest_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_tunnel_dest
      changed_when: false
      check_mode: false
      no_log: true

    - name: Get Tunnel0.0 fixed IPv4 address from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_tunnel_ip_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_tunnel_ip
      changed_when: false
      check_mode: false
      no_log: true

    - name: Get NM account password from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_nm_account_password_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false

      register: ix2215_nm_account_password
      changed_when: false
      check_mode: false
      no_log: true
      when: bsm_ix2215_nm_account_password_id | length > 0

    - name: Get OCI VPN PSK from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_ix2215_vpn_psk_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false
      register: ix2215_vpn_psk
      changed_when: false
      check_mode: false
      no_log: true
      when: bsm_ix2215_vpn_psk_id | length > 0

    - name: Get OCI VPN tunnel IP from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_oci_tunnel_ip_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false
      register: _oci_tunnel_ip
      changed_when: false
      check_mode: false
      no_log: true
      when: bsm_oci_tunnel_ip_id | length > 0

    - name: Get CPE inside IP from BSM
      ansible.builtin.shell:
        cmd: "set -o pipefail && bws secret get {{ bsm_cpe_inside_ip_id }} | jq -r '.value'"
        executable: /bin/bash
      environment:
        BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
        PATH: "{{ lookup('env', 'HOME') }}/bin:/usr/local/bin:/usr/bin:/bin"
      delegate_to: localhost
      become: false
      register: _cpe_inside_ip
      changed_when: false
      check_mode: false
      no_log: true
      when: bsm_cpe_inside_ip_id | length > 0

    - name: Merge VPN OCI dynamic values into ix_vpn_oci
      ansible.builtin.set_fact:
        ix_vpn_oci: >-
          {{ ix_vpn_oci | combine({
            'oci_tunnel_ip': _oci_tunnel_ip.stdout | trim,
            'cpe_inside_ip': _cpe_inside_ip.stdout | trim
          }) }}
      when:
        - bsm_oci_tunnel_ip_id | length > 0
        - bsm_cpe_inside_ip_id | length > 0
        - _oci_tunnel_ip.stdout is defined
        - _cpe_inside_ip.stdout is defined

  roles:
    - system_base
    - dns_config
    - static_routes
    - access_lists
    - dhcp_profiles
    - interfaces
    - ddns_config
    - vpn_oci

  post_tasks:
    - name: Fetch running-config for verification
      ansible.builtin.command:
        cmd: python3 scripts/fetch_running_config.py
        chdir: "{{ playbook_dir }}"
      environment:
        IX2215_HOST: "{{ ix2215_host }}"
        IX2215_USER: "{{ ix2215_user }}"
        IX2215_PASSWORD: "{{ ix2215_ssh_password.stdout | trim }}"
      register: running_config
      changed_when: false
      check_mode: false

    - name: Show running-config
      ansible.builtin.debug:
        msg: "{{ running_config.stdout }}"
