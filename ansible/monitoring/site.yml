---
- name: Install node_exporter on existing VMs (one-time migration)
  hosts: monitored_vms
  become: true
  vars:
    node_exporter_version: "1.8.2"
    node_exporter_arch: "linux-amd64"

  tasks:
    - name: Create node_exporter system user
      user:
        name: node_exporter
        system: true
        shell: /sbin/nologin
        create_home: false

    - name: Check installed version
      command: /usr/local/bin/node_exporter --version
      register: installed_version
      failed_when: false
      changed_when: false

    - name: Download node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}.tar.gz"
        dest: /tmp/node_exporter.tar.gz
        mode: '0644'
      when: node_exporter_version not in (installed_version.stdout | default(''))

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: true
      when: node_exporter_version not in (installed_version.stdout | default(''))

    - name: Install node_exporter binary
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}/node_exporter"
        dest: /usr/local/bin/node_exporter
        owner: root
        group: root
        mode: '0755'
        remote_src: true
      when: node_exporter_version not in (installed_version.stdout | default(''))
      notify: restart node_exporter

    - name: Deploy systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          ExecStart=/usr/local/bin/node_exporter \
            --web.listen-address=0.0.0.0:9100 \
            --collector.systemd \
            --collector.processes
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
      notify:
        - reload systemd
        - restart node_exporter

    - name: Enable and start node_exporter
      systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: Clean up temp files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/node_exporter.tar.gz
        - "/tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}"

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: true

    - name: restart node_exporter
      systemd:
        name: node_exporter
        state: restarted
