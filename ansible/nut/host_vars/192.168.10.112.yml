---
# RPi#1 — UPS A のドライバ/監視ホスト。
# 自身は UPS B で給電されるため、ローカル UPS A は primary だが給電源には数えない。
# 給電元 UPS B は RPi#2(.113) の upsd を secondary として監視する。
nut_listen_ip: 192.168.10.112

nut_ups:
  name: ups-a
  driver: usbhid-ups
  port: auto # serial 固定はしない(接続中の APC を自動検出)
  # desc に '#'(半角) を含めないこと(NUT の ups.conf パーサがクォート内でもコメント扱いして壊れる)。
  desc: "UPS A (APC RS 550S) powers pve-x570 + RPi＃2(.113)"

nut_driver_powervalue: 0
nut_power_monitor:
  ups: "ups-b@192.168.10.113" # RPi#1 の給電元 = UPS B
  powervalue: 1
nut_minsupplies: 1

# cross-power 構成では、この Pi の shutdown 理由はリモート UPS B になり得る。
# その時にローカル USB 接続の UPS A を誤って killpower しないよう POWERDOWNFLAG は出さない。
nut_powerdownflag_enabled: false

# ホスト名を担当 UPS に揃える場合は有効化(任意)。docs/ups-shutdown.md 参照。
# nut_hostname: nut-pi-01-mon-ups-a-pwr-ups-b
