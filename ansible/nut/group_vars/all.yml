---
# ───────────────────────── しきい値・タイミング ─────────────────────────
# PVE を落とすバッテリ残量(%)。OB(停電)中に battery.charge がこの値以下で
# クリーンシャットダウン。VM 停止に時間がかかるため早めに倒す。
nut_pve_charge_threshold: 80

# UPS の LOWBATT 判定残量(%)。ここで給電されるホストが最終停止する。
# Pi は省電力なので、給電元 UPS がここに達するまでは粘らせる。
nut_lowbatt_charge: 10

# killpower(出力遮断)コマンド送出から実際に UPS が出力を切るまでの猶予(秒)。
# = usbhid-ups の offdelay。cross-power の Pi では host_vars 側で自動 killpower
# (POWERDOWNFLAG) を無効化し、必要なら手動 upscmd で使う。
nut_offdelay: 150

# AC 復電後、UPS が出力を再投入するまでの遅延(秒)。usbhid-ups の制約で
# ondelay > offdelay が必須。瞬時再投入による突入・再起動ループも避ける。
nut_ondelay: 180

# 残量ガード(PVE)のポーリング間隔(秒)
nut_charge_guard_interval: 20

# ───────────────────────── NUT 認証ユーザー ─────────────────────────
# upsd.users に作る監視用ユーザー名。
nut_user_primary: monmaster   # USB 接続 UPS の primary upsmon が localhost upsd へログイン
nut_user_secondary: monslave  # 給電されるホストの secondary upsmon がネットワーク越しにログイン
nut_user_admin: upsadmin      # 手動管理用(バッテリーテスト・手動 killpower 等の instcmd)

# 監視ユーザーのパスワード(primary/secondary 共通)。
# Bitwarden Secrets Manager (BSM) から取得する。
#   作成例: bws secret create nut-monitor-password "$(openssl rand -base64 24)"
#   そのシークレット ID を下にセットする (bws secret list で確認)。
bsm_nut_monitor_password_id: "ad0baeb8-12f7-47bf-874e-b476010a96c8"

# 制御ホストの BWS_ACCESS_TOKEN を使って遅延評価で取得する。
# jq が制御ホストに必要。
nut_monitor_password: >-
  {{ lookup('pipe', 'bws secret get ' ~ bsm_nut_monitor_password_id ~ " | jq -r '.value'") }}
