---
# ups.conf / upsd.conf / upsd.users / upsmon.conf いずれかの変更で
# ドライバ→upsd→upsmon の順に再起動する。
# nut-driver-enumerator が ups.conf を読み直してドライバインスタンスを生成し、
# nut-driver.target が全ドライバを再起動する。
- name: Restart NUT stack
  ansible.builtin.shell: |
    set -e
    systemctl restart nut-driver-enumerator.service
    systemctl restart nut-driver.target
    systemctl restart nut-server.service
    systemctl restart nut-monitor.service
  changed_when: true
