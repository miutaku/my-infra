---
# データセット作成 → マウントポイントのパーミッション → NFS export → NFS サービス
# を truenas_datasets (host_vars) から宣言的に適用する。

- name: Ensure ZFS datasets exist
  arensb.truenas.filesystem:
    name: "{{ item.name }}"
    create_ancestors: true
    state: present
  loop: "{{ truenas_datasets }}"
  loop_control:
    label: "{{ item.name }}"

# owner/group/mode を指定した dataset のみ適用 (未指定なら既存パーミッションに触らない)
- name: Set mountpoint ownership and mode (top-level only, not recursive)
  ansible.builtin.file:
    path: "/mnt/{{ item.name }}"
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "{{ item.mode | default(omit) }}"
  when: item.owner is defined or item.group is defined or item.mode is defined
  loop: "{{ truenas_datasets }}"
  loop_control:
    label: "/mnt/{{ item.name }}"

- name: Ensure NFS exports
  arensb.truenas.sharing_nfs:
    name: "{{ item.nfs.comment | default(item.name | basename) }}"
    path: "/mnt/{{ item.name }}"
    networks: "{{ item.nfs.networks | default(truenas_nfs_default_networks) }}"
    maproot_user: "{{ item.nfs.maproot_user | default('root') }}"
    maproot_group: "{{ item.nfs.maproot_group | default('root') }}"
    enabled: true
    state: present
  loop: "{{ truenas_datasets | selectattr('nfs', 'defined') | list }}"
  loop_control:
    label: "/mnt/{{ item.name }}"

# RKE2 PV は nfsvers=4.1 でマウントする
- name: Enable NFSv3 + NFSv4
  arensb.truenas.nfs:
    protocols:
      - NFSv3
      - NFSv4

- name: Ensure NFS service is enabled and running
  arensb.truenas.service:
    name: nfs
    enabled: true
    state: started
