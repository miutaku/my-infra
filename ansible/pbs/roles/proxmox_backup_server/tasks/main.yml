---
- name: Pre-seeded Postfix mailer type
  ansible.builtin.debconf:
    name: postfix
    question: postfix/main_mailer_type
    value: 'Internet Site'
    vtype: select

- name: Pre-seeded Postfix mailname
  ansible.builtin.debconf:
    name: postfix
    question: postfix/mailname
    value: "{{ ansible_fqdn }}"
    vtype: string

- name: Placed PBS GPG key (Debian 13 trixie / PBS 4.x)
  ansible.builtin.get_url:
    url: https://enterprise.proxmox.com/debian/proxmox-release-trixie.gpg
    dest: /usr/share/keyrings/proxmox-archive-keyring.gpg
    checksum: "sha512:8678f2327c49276615288d7ca11e7d296bc8a2b96946fe565a9c81e533f9b15a5dbbad210a0ad5cd46d361ff1d3c4bac55844bc296beefa4f88b86e44e69fa51"
    mode: '0644'
    owner: root
    group: root

- name: Added PBS no-subscription repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pbs
      Suites: trixie
      Components: pbs-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
    dest: /etc/apt/sources.list.d/pbs-no-subscription.sources
    mode: '0644'
    owner: root
    group: root

- name: Disabled PBS enterprise repositories before apt update
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/pbs-enterprise.list
    - /etc/apt/sources.list.d/pbs-enterprise.sources

- name: Installed proxmox-backup-server
  ansible.builtin.apt:
    name: proxmox-backup-server
    state: present
    update_cache: true
  retries: 100
  delay: 5

- name: Disabled PBS enterprise repositories after install
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/pbs-enterprise.list
    - /etc/apt/sources.list.d/pbs-enterprise.sources

- name: Refreshed apt cache after PBS repository changes
  ansible.builtin.apt:
    update_cache: true
  changed_when: false

- name: Started proxmox-backup service
  ansible.builtin.service:
    name: proxmox-backup
    state: started
    enabled: true

- name: Checked PBS datastore name is valid
  ansible.builtin.assert:
    that:
      - pbs.datastore_name | length >= 3
    fail_msg: "pbs.datastore_name must be at least 3 characters for proxmox-backup-manager datastore create."

- name: Checked BWS access token is set on control host
  ansible.builtin.assert:
    that:
      - lookup('env', 'BWS_ACCESS_TOKEN') | length > 0
    fail_msg: "BWS_ACCESS_TOKEN is not set on the Ansible control host."
  delegate_to: localhost
  become: false
  run_once: true

- name: Checked BSM CLI dependencies on control host
  ansible.builtin.command:
    argv:
      - /usr/bin/env
      - which
      - "{{ item }}"
  loop:
    - bws
    - jq
  delegate_to: localhost
  become: false
  run_once: true
  changed_when: false

- name: Checked BSM secret IDs are readable
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      bws secret get {{ item.id | quote }} |
      jq -e '.value | strings | select(length > 0)' >/dev/null
    executable: /bin/bash
  environment:
    BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
  loop:
    - name: PBS admin password
      id: "{{ bsm_pbs_admin_password_id }}"
    - name: S3 access key
      id: "{{ bsm_s3_access_key_id }}"
    - name: S3 secret key
      id: "{{ bsm_s3_secret_key_id }}"
  loop_control:
    label: "{{ item.name }} ({{ item.id }})"
  delegate_to: localhost
  become: false
  run_once: true
  check_mode: false
  changed_when: false

- name: Got PBS admin password from BSM
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      bws secret get {{ bsm_pbs_admin_password_id | quote }} |
      jq -er '.value | strings | select(length > 0)'
    executable: /bin/bash
  environment:
    BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
  delegate_to: localhost
  become: false
  run_once: true
  register: pbs_admin_password_result
  check_mode: false
  changed_when: false
  no_log: true

- name: Checked existing PBS users
  ansible.builtin.command:
    cmd: "proxmox-backup-manager user list --output-format json"
  register: pbs_users
  changed_when: false
  failed_when: false

- name: Checked PBS password database
  ansible.builtin.stat:
    path: /etc/proxmox-backup/shadow.json
  register: pbs_shadow

- name: Removed admin@pbs user created without password database
  ansible.builtin.command:
    cmd: "proxmox-backup-manager user remove {{ pbs.admin_user }}"
  when: >-
    pbs_users.rc == 0
    and not pbs_shadow.stat.exists
    and (pbs_users.stdout | from_json | selectattr('userid', 'eq', pbs.admin_user) | list | length > 0)
  changed_when: true

- name: Rechecked existing PBS users
  ansible.builtin.command:
    cmd: "proxmox-backup-manager user list --output-format json"
  register: pbs_users
  changed_when: false
  failed_when: false

- name: Created admin@pbs user
  ansible.builtin.command:
    argv:
      - proxmox-backup-manager
      - user
      - create
      - "{{ pbs.admin_user }}"
      - --password
      - "{{ pbs_admin_password_result.stdout }}"
  when: >-
    pbs_users.rc != 0
    or (pbs_users.stdout | from_json | selectattr('userid', 'eq', pbs.admin_user) | list | length == 0)
  changed_when: true
  no_log: true

- name: Got S3 access key from BSM
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      bws secret get {{ bsm_s3_access_key_id | quote }} |
      jq -er '.value | strings | select(length > 0)'
    executable: /bin/bash
  environment:
    BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
  delegate_to: localhost
  become: false
  run_once: true
  register: s3_access_key_result
  check_mode: false
  changed_when: false
  no_log: true

- name: Got S3 secret key from BSM
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      bws secret get {{ bsm_s3_secret_key_id | quote }} |
      jq -er '.value | strings | select(length > 0)'
    executable: /bin/bash
  environment:
    BWS_ACCESS_TOKEN: "{{ lookup('env', 'BWS_ACCESS_TOKEN') }}"
  delegate_to: localhost
  become: false
  run_once: true
  register: s3_secret_key_result
  check_mode: false
  changed_when: false
  no_log: true

- name: Checked existing S3 endpoints
  ansible.builtin.command:
    cmd: "proxmox-backup-manager s3 endpoint list --output-format json"
  register: pbs_s3_endpoints
  changed_when: false
  failed_when: false

- name: Created S3 endpoint (iDrive e2)
  ansible.builtin.command:
    argv: "{{ s3_endpoint_argv }}"
  vars:
    s3_endpoint_argv: >-
      {{
        ['proxmox-backup-manager', 's3', 'endpoint', 'create', s3.endpoint_name,
         '--access-key', s3_access_key_result.stdout,
         '--secret-key', s3_secret_key_result.stdout,
         '--endpoint', s3.endpoint_host,
         '--region', s3.region]
        + (['--path-style', 'true'] if s3.path_style else [])
        + (['--port', s3.port | string] if (s3.port | string | length > 0) else [])
        + (['--fingerprint', s3.fingerprint] if (s3.fingerprint | length > 0) else [])
      }}
  when: s3.endpoint_name not in (pbs_s3_endpoints.stdout | default(''))
  changed_when: true
  no_log: true

- name: Checked existing PBS datastores
  ansible.builtin.command:
    cmd: "proxmox-backup-manager datastore list --output-format json"
  register: pbs_datastores
  changed_when: false
  failed_when: false

- name: Created S3-backed PBS datastore
  ansible.builtin.command:
    argv:
      - proxmox-backup-manager
      - datastore
      - create
      - "{{ pbs.datastore_name }}"
      - "{{ cache.mountpoint }}"
      - --backend
      - "type=s3,client={{ s3.endpoint_name }},bucket={{ s3.bucket }}"
  when: >-
    pbs_datastores.rc != 0
    or (pbs_datastores.stdout | from_json | selectattr('name', 'eq', pbs.datastore_name) | list | length == 0)
  changed_when: true

- name: Read PBS datastore config
  ansible.builtin.command:
    cmd: "proxmox-backup-manager datastore show {{ pbs.datastore_name }} --output-format json"
  register: pbs_datastore_cfg
  changed_when: false

# S3-backed キャッシュは fsync が重く、default の sync-level だとローカル I/O が飽和して
# proxmox-backup-proxy が詰まる (PSI io full が跳ねる)。データ本体は S3 にあり再生成可能。
- name: Set PBS datastore tuning (sync-level)
  ansible.builtin.command:
    cmd: "proxmox-backup-manager datastore update {{ pbs.datastore_name }} --tuning sync-level={{ pbs.sync_level }}"
  when: ('sync-level=' ~ pbs.sync_level) not in pbs_datastore_cfg.stdout
  changed_when: true

- name: Granted Admin role to admin@pbs
  ansible.builtin.command:
    cmd: >-
      proxmox-backup-manager acl update
      /
      Admin
      --auth-id {{ pbs.admin_user }}
  changed_when: false

- name: Granted DatastoreAdmin role to admin@pbs
  ansible.builtin.command:
    cmd: >-
      proxmox-backup-manager acl update
      /datastore/{{ pbs.datastore_name }}
      DatastoreAdmin
      --auth-id {{ pbs.admin_user }}
  changed_when: false

- name: Scheduled PBS GC
  ansible.builtin.command:
    cmd: "proxmox-backup-manager datastore update {{ pbs.datastore_name }} --gc-schedule '{{ pbs.gc_schedule }}'"
  changed_when: false

- name: Checked existing PBS prune jobs
  ansible.builtin.command:
    cmd: "proxmox-backup-manager prune-job list --output-format json"
  register: pbs_prune_jobs
  changed_when: false
  failed_when: false

- name: Created PBS prune job
  ansible.builtin.command:
    cmd: >-
      proxmox-backup-manager prune-job create {{ pbs.datastore_name }}-prune
      --store {{ pbs.datastore_name }}
      --schedule '{{ pbs.prune_schedule }}'
      --keep-last {{ pbs.keep_last }}
      --keep-daily {{ pbs.keep_daily }}
      --keep-weekly {{ pbs.keep_weekly }}
      --keep-monthly {{ pbs.keep_monthly }}
  when: >-
    pbs_prune_jobs.rc != 0
    or (pbs_prune_jobs.stdout | from_json | selectattr('id', 'eq', pbs.datastore_name ~ '-prune') | list | length == 0)
  changed_when: true
