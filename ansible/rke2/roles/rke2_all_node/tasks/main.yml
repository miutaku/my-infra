---
- name: Added k8s bin directory to system-wide PATH
  ansible.builtin.lineinfile:
    path: /etc/profile.d/999-rke2-path.sh
    line: 'PATH=$PATH:/var/lib/rancher/rke2/bin'
    create: true
    state: present
    mode: '0755'
    owner: root
    group: root

- name: Installed iptables
  ansible.builtin.apt:
    name: iptables
    state: present
    update_cache: true
    autoremove: true
  retries: 100
  delay: 5
